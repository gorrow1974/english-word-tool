<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word World v27</title>
<style>
*{box-sizing:border-box}:root{--bg:#f7faf4;--ink:#102016;--muted:#64748b;--green:#174a2b;--navy:#07345b;--orange:#fb7c13;--line:#dce7da}
html,body{height:100%}body{margin:0;background:radial-gradient(circle at top,#fff 0,#f7faf4 48%,#eef7ed 100%);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
.app{height:100vh;max-width:980px;margin:0 auto;padding:18px;display:grid;grid-template-rows:auto 1fr auto;gap:14px}
.header{display:flex;justify-content:space-between;align-items:center}.logo{font-size:26px;font-weight:1000;color:var(--green);line-height:1}.logo small{display:block;font-size:12px;color:var(--muted);margin-top:5px}.counter{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-weight:1000;color:var(--green)}
.main{min-height:0;display:flex;flex-direction:column;justify-content:center;gap:18px}.scene{background:#fff;border:1px solid var(--line);border-radius:30px;padding:28px 34px;box-shadow:0 20px 60px #00000012}.meta{display:flex;justify-content:space-between;gap:12px;margin-bottom:24px}.theme{color:var(--navy);font-weight:1000}.badges span{display:inline-block;border-radius:999px;background:#e9f7ec;color:#166534;padding:6px 10px;font-weight:1000;font-size:11px;margin-left:5px}.title{font-size:32px;color:var(--navy);font-weight:1000;margin:0 0 28px;letter-spacing:-.035em}.sentence{max-width:820px;margin:0 auto;font-size:30px;line-height:1.55;font-weight:950}.chunk{color:var(--orange);background:#fff3df;border-radius:10px;padding:0 6px}
.choose{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.choice{border:3px solid #d8e7f7;border-radius:24px;padding:20px 10px;background:#fff;box-shadow:0 14px 35px #00000010;font-size:23px;font-weight:1000;cursor:pointer;min-height:92px}.choice small{display:block;font-size:12px;color:var(--muted);font-weight:1000;margin-top:5px}.choice.vs{border-color:#93c5fd}.choice.why{border-color:#fca5a5}.choice.so{border-color:#86efac}.choice.correct{background:#dcfce7;color:#166534;border-color:#22c55e}.choice.wrong{background:#fee2e2;color:#991b1b;border-color:#ef4444}
.timer{background:#fff;border:1px solid var(--line);border-radius:20px;padding:11px 14px;box-shadow:0 10px 30px #0000000d}.timerTop{display:flex;justify-content:space-between;align-items:center;font-weight:1000;color:#334155}.timerTop b{font-size:22px;color:var(--orange)}.barOut{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.bar{height:100%;width:100%;background:var(--orange);transition:width .08s linear}.footer{display:flex;justify-content:space-between;align-items:center}.footer button,.modalActions button{border:0;border-radius:18px;padding:13px 20px;font-weight:1000;font-size:14px}.secondary{background:#e5e7eb;color:#334155}.primary{background:var(--green);color:#fff}.stats{color:#64748b;font-size:13px;font-weight:1000}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;padding:20px;z-index:10;backdrop-filter:blur(5px)}.overlay.show{display:flex}.modal{width:min(720px,100%);background:#fff;border-radius:34px;box-shadow:0 40px 120px #00000040;padding:28px}.feedback{font-size:36px;font-weight:1000;text-align:center;margin-bottom:14px}.feedback.ok{color:#166534}.feedback.ng{color:#991b1b}.structure{color:#fff;border-radius:28px;padding:22px;text-align:center}.structure.VS{background:linear-gradient(135deg,#2563eb,#1e3a8a)}.structure.WHY{background:linear-gradient(135deg,#dc2626,#7f1d1d)}.structure.SO{background:linear-gradient(135deg,#16a34a,#14532d)}.symbol{font-size:44px;font-weight:1000;margin-bottom:12px}.compare{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin:14px 0}.node{background:#fff;color:#0f172a;border-radius:18px;padding:15px 12px;min-height:68px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:1000}.arrow{font-size:34px;font-weight:1000}.reveal{font-size:18px;font-weight:1000;line-height:1.45;margin-top:12px}.aha{background:#fff8e7;border:2px solid #f2c878;border-radius:20px;padding:16px;font-size:20px;font-weight:1000;line-height:1.45;margin-top:14px}.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
@media(max-width:760px){body{overflow:auto}.app{height:auto;min-height:100vh;padding:12px}.logo{font-size:22px}.main{justify-content:flex-start;gap:12px}.scene{border-radius:22px;padding:20px 18px}.meta{margin-bottom:16px}.title{font-size:24px;margin-bottom:20px}.sentence{font-size:20px}.choose{gap:8px}.choice{min-height:76px;border-radius:18px;font-size:17px;padding:14px 4px}.choice small{font-size:10px}.footer{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 25%);padding-top:18px}.modal{border-radius:26px;padding:18px}.feedback{font-size:30px}.symbol{font-size:36px}.node{font-size:14px;min-height:58px}.aha{font-size:16px}}
</style></head>
<body>
<div class="app"><header class="header"><div class="logo">🌏 Word World<small>v27 次男坊配布版 / 英語を読む。構造が見える。</small></div><div class="counter" id="counter">1/30</div></header>
<main class="main"><section class="scene"><div class="meta"><div class="theme" id="theme">🌍 Scene</div><div class="badges" id="badges"></div></div><h1 class="title" id="title"></h1><div class="sentence" id="sentence"></div></section><section class="choose" id="choices"></section><section class="timer"><div class="timerTop"><span>認識時間</span><span><b id="remain">10.0</b> 秒</span></div><div class="barOut"><div class="bar" id="bar"></div></div></section></main>
<footer class="footer"><button class="secondary" id="prev">前へ</button><div class="stats" id="stats">0%</div><button class="primary" id="next">次へ</button></footer></div>
<div class="overlay" id="overlay"><div class="modal"><div class="feedback" id="feedback"></div><div class="structure" id="structure"><div class="symbol" id="symbol"></div><div class="compare"><div class="node" id="before"></div><div class="arrow" id="arrow"></div><div class="node" id="after"></div></div><div class="reveal" id="reveal"></div></div><div class="aha" id="aha"></div><div class="modalActions"><button class="secondary" id="close">もう一度見る</button><button class="primary" id="modalNext">次へ</button></div></div></div>
<script>
let DATA,items=[],groups=[],idx=0,logs=[],timer=null,t0=0,limit=10;const E=x=>document.getElementById(x);
fetch('data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{DATA=d;items=d.items;groups=d.groups;idx=+localStorage.ww27idx||0;logs=JSON.parse(localStorage.ww27logs||'[]');bind();render()});
function bind(){E('next').onclick=next;E('modalNext').onclick=next;E('prev').onclick=()=>{idx=(idx-1+items.length)%items.length;save();render()};E('close').onclick=()=>E('overlay').classList.remove('show')}
function save(){localStorage.ww27idx=idx;localStorage.ww27logs=JSON.stringify(logs)}function current(){return items[idx%items.length]}
function h(s,c){if(!c)return s;const esc=c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return s.replace(new RegExp(esc,'i'),m=>'<span class="chunk">'+m+'</span>')}
function render(){const it=current();E('overlay').classList.remove('show');E('counter').textContent=(idx+1)+'/'+items.length;E('theme').textContent='🌍 '+(it.theme||'Scene');E('badges').innerHTML='<span>'+it.id+'</span><span>'+it.chunk+'</span>';E('title').textContent=it.title;E('sentence').innerHTML=h(it.sentence,it.chunk);drawChoices();updateStats();startTimer()}
function drawChoices(){E('choices').innerHTML='';groups.forEach(g=>{const b=document.createElement('button');b.className='choice '+g.class;b.innerHTML='<b>'+g.label+'</b><small>'+g.id+'</small>';b.onclick=()=>answer(g.id,b);E('choices').appendChild(b)})}
function startTimer(){if(timer)clearInterval(timer);limit=10;t0=Date.now();E('remain').textContent=limit.toFixed(1);E('bar').style.width='100%';E('bar').style.background='var(--orange)';timer=setInterval(()=>{const s=(Date.now()-t0)/1000,r=Math.max(0,limit-s),p=Math.max(0,r/limit*100);E('remain').textContent=r.toFixed(1);E('bar').style.width=p+'%';E('bar').style.background=p>50?'#fb7c13':p>20?'#facc15':'#ef4444';if(r<=0)clearInterval(timer)},100)}
function elapsed(){const s=(Date.now()-t0)/1000;if(timer)clearInterval(timer);return +s.toFixed(2)}
function answer(ans,btn){const it=current(),t=elapsed(),ok=ans===it.type;[...E('choices').children].forEach(b=>b.disabled=true);btn.classList.add(ok?'correct':'wrong');logs.push({id:it.id,type:it.type,answer:ans,ok,time:t,ts:new Date().toISOString()});save();showModal(ok);updateStats()}
function showModal(ok){const it=current();E('feedback').className='feedback '+(ok?'ok':'ng');E('feedback').textContent=ok?'正解！':'惜しい！';E('structure').className='structure '+it.type;E('symbol').textContent=it.symbol;E('before').textContent=it.before;E('after').textContent=it.after;E('arrow').textContent=it.type==='VS'?'⇔':'→';E('reveal').textContent=it.reveal;E('aha').textContent=it.aha;E('overlay').classList.add('show')}
function next(){idx=(idx+1)%items.length;save();render()}function updateStats(){const tries=logs.length,ok=logs.filter(x=>x.ok).length;E('stats').textContent=tries?Math.round(ok/tries*100)+'%':'0%'}
</script></body></html>
