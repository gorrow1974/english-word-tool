<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word World v26 30</title>
<style>
*{box-sizing:border-box}:root{--bg:#f6faf4;--panel:#fff;--green:#174a2b;--navy:#07345b;--orange:#fb7c13;--line:#dce7da}html,body{height:100%}body{margin:0;background:var(--bg);color:#102016;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}.app{height:100vh;display:flex;flex-direction:column;padding:10px;gap:8px}.header{display:flex;justify-content:space-between;align-items:center;gap:10px;flex:0 0 auto}.logo{font-size:23px;font-weight:1000;color:var(--green);line-height:1}.logo small{display:block;font-size:12px;color:#64748b;margin-top:3px}.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:1000;color:#174a2b}.board{display:grid;grid-template-columns:1.2fr .8fr 1.25fr;gap:10px;flex:1 1 auto;min-height:0}.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 10px 28px #00000010;min-height:0;display:flex;flex-direction:column}.cardTitle{font-weight:1000;color:#0f3d25;font-size:14px;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px;align-items:center}.meta span{display:inline-block;border-radius:999px;background:#e9f7ec;color:#166534;padding:5px 9px;font-weight:1000;font-size:11px;margin:2px}.sceneName{font-size:22px;font-weight:1000;color:#07345b;margin:10px 0 8px}.sentence{font-size:21px;line-height:1.45;font-weight:900;background:#f8fbff;border:2px solid #dbeafe;border-radius:18px;padding:14px;overflow:auto}.chunk{color:#fb7c13;font-weight:1000}.chooseQuestion{font-size:20px;font-weight:1000;color:#0f3d25;text-align:center;margin:10px 0 12px}.choices{display:grid;grid-template-columns:1fr;gap:10px;margin-top:auto;margin-bottom:auto}.btn{border:3px solid #d8e7f7;border-radius:20px;background:#f8fbff;padding:18px 8px;font-size:20px;font-weight:1000;text-align:center;cursor:pointer}.btn small{display:block;font-size:12px;color:#64748b;font-weight:900;margin-top:4px}.btn.vs{border-color:#93c5fd}.btn.why{border-color:#fca5a5}.btn.so{border-color:#86efac}.btn.correct{background:#dcfce7;border-color:#22c55e;color:#166534}.btn.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b}.insightEmpty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:#64748b;font-weight:1000;font-size:18px;border:2px dashed #dbe3df;border-radius:18px}.insightContent{display:none;animation:fade .25s ease-out}.insightContent.show{display:block}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.structureCard{border-radius:22px;padding:16px;text-align:center;color:#fff}.structureCard.VS{background:linear-gradient(135deg,#2563eb,#1e3a8a)}.structureCard.WHY{background:linear-gradient(135deg,#dc2626,#7f1d1d)}.structureCard.SO{background:linear-gradient(135deg,#16a34a,#14532d)}.symbol{font-size:40px;font-weight:1000;margin:6px 0 10px}.compare{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin:12px 0}.node{background:#fff;color:#0f172a;border-radius:16px;padding:12px;font-size:16px;font-weight:1000;min-height:64px;display:flex;align-items:center;justify-content:center}.arrow{font-size:28px;font-weight:1000}.revealText{font-size:17px;font-weight:1000;line-height:1.45;margin-top:10px}.aha{background:#fff8e7;border:2px solid #f2c878;border-radius:18px;padding:13px;font-size:18px;font-weight:1000;line-height:1.45;margin-top:10px;color:#102016}.nav{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;flex:0 0 auto}.nav button{border:0;border-radius:18px;padding:12px 8px;font-weight:1000;font-size:14px}.secondary{background:#e5e7eb}.primary{background:var(--green);color:white}.stats{font-size:12px;color:#64748b;font-weight:900}@media(max-width:760px){body{overflow:auto}.app{height:auto;min-height:100vh}.board{display:block}.card{margin-bottom:8px;min-height:auto}.sceneName{font-size:18px}.sentence{font-size:17px;max-height:none}.choices{grid-template-columns:repeat(3,1fr);gap:7px}.btn{font-size:15px;padding:13px 4px;border-width:2px}.btn small{font-size:10px}.insightEmpty{min-height:110px}.symbol{font-size:32px}.node{font-size:13px;min-height:54px;padding:9px}.aha{font-size:15px}.revealText{font-size:14px}.logo{font-size:21px}}
</style></head>
<body><div class="app"><div class="header"><div class="logo">🌏 Word World<small>v26 / 30問版 Scene・Choose・Insight</small></div><div class="pill" id="counter">1/30</div></div><main class="board"><section class="card"><div class="cardTitle"><span>🌍 Scene</span><span id="theme"></span></div><div class="meta" id="meta"></div><div class="sceneName" id="title"></div><div class="sentence" id="sentence"></div></section><section class="card"><div class="cardTitle"><span>🤔 Choose</span><span class="stats" id="stats"></span></div><div class="chooseQuestion">何をしている？</div><div class="choices" id="choices"></div></section><section class="card"><div class="cardTitle"><span>💡 Insight</span><span id="typeNow"></span></div><div class="insightEmpty" id="empty">選ぶと、構造がここに浮かび上がります。</div><div class="insightContent" id="insight"><div class="structureCard" id="structure"><div class="symbol" id="symbol"></div><div class="compare"><div class="node" id="before"></div><div class="arrow" id="arrow"></div><div class="node" id="after"></div></div><div class="revealText" id="reveal"></div></div><div class="aha" id="aha"></div></div></section></main><div class="nav"><button class="secondary" id="prev">前へ</button><button class="secondary" id="reset">リセット</button><button class="primary" id="next">次へ</button></div></div>
<script>
let DATA,items=[],groups=[],idx=0,logs=[],recent=[];const E=x=>document.getElementById(x);fetch('data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{DATA=d;items=d.items;groups=d.groups;idx=+localStorage.ww2630idx||0;logs=JSON.parse(localStorage.ww2630logs||'[]');recent=JSON.parse(localStorage.ww2630recent||'[]');bind();render()});function bind(){E('next').onclick=next;E('prev').onclick=()=>{idx=(idx-1+items.length)%items.length;save();render()};E('reset').onclick=()=>{idx=0;logs=[];recent=[];localStorage.removeItem('ww2630idx');localStorage.removeItem('ww2630logs');localStorage.removeItem('ww2630recent');render()}}function save(){localStorage.ww2630idx=idx;localStorage.ww2630logs=JSON.stringify(logs);localStorage.ww2630recent=JSON.stringify(recent.slice(-5))}function current(){return items[idx%items.length]}function h(sentence,chunk){if(!chunk)return sentence;const esc=chunk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return sentence.replace(new RegExp(esc,'i'),m=>'<span class="chunk">'+m+'</span>')}function render(){const it=current();E('counter').textContent=(idx+1)+'/'+items.length;E('theme').textContent=it.theme||'';E('meta').innerHTML='<span>'+it.id+'</span><span>'+it.chunk+'</span>';E('title').textContent=it.title;E('sentence').innerHTML=h(it.sentence,it.chunk);E('empty').style.display='flex';E('insight').classList.remove('show');E('typeNow').textContent='';drawChoices();updateStats()}function drawChoices(){E('choices').innerHTML='';groups.forEach(g=>{const b=document.createElement('button');b.className='btn '+g.class;b.innerHTML='<b>'+g.label+'</b><small>'+g.id+'</small>';b.onclick=()=>answer(g.id,b);E('choices').appendChild(b)})}function answer(ans,btn){const it=current();const ok=ans===it.type;[...E('choices').children].forEach(b=>b.disabled=true);btn.classList.add(ok?'correct':'wrong');logs.push({id:it.id,type:it.type,answer:ans,ok,ts:new Date().toISOString()});recent.push(it.id);save();reveal(ok);updateStats()}function reveal(ok){const it=current();E('empty').style.display='none';E('insight').classList.add('show');E('typeNow').textContent=it.type;E('structure').className='structureCard '+it.type;E('symbol').textContent=it.symbol;E('before').textContent=it.before;E('after').textContent=it.after;E('arrow').textContent=it.type==='VS'?'⇔':'→';E('reveal').textContent=it.reveal;E('aha').textContent=(ok?'✨ Insight Found. ':'もう一歩。 ')+it.aha}function next(){const cur=current();let nextIdx=(idx+1)%items.length;for(let step=0;step<items.length;step++){const cand=items[(idx+1+step)%items.length];if(cand.type!==cur.type&&!recent.slice(-3).includes(cand.id)){nextIdx=(idx+1+step)%items.length;break}}idx=nextIdx;save();render()}function updateStats(){const tries=logs.length,ok=logs.filter(x=>x.ok).length;E('stats').textContent=tries?Math.round(ok/tries*100)+'%':'0%'}</script></body></html>
