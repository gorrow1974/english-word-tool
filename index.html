<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>WW v21 Fast</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        #word { font-size: 48px; font-weight: 800; margin: 40px 0; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 600px; margin: 0 auto; }
        button { padding: 30px 0; border: none; background: #222; color: #fff; border-radius: 4px; font-size: 14px; font-weight: bold; }
        button:active { background: #fff; color: #000; }
        #export { margin-top: 40px; color: #444; font-size: 10px; }
    </style>
</head>
<body>

<div id="word">create</div>

<div class="grid">
    <button onclick="record('VS')">VS</button>
    <button onclick="record('SO')">SO</button>
    <button onclick="record('DATA')">DATA</button>
    <button onclick="record('EX')">EX</button>
    <button onclick="record('DEC')">DEC</button>
</div>

<div id="export" onclick="downloadCSV()">CSV EXPORT</div>

<script>
    const words = ["create", "increase", "improve", "mean", "own", "include", "consider", "allow", "suggest", "produce", "decide", "offer", "require", "share", "store", "tend", "concern", "describe", "involve", "reduce", "design", "force", "correlation", "hypothesis", "paradox", "validity", "inference", "nature", "issue"];
    let idx = 0;
    let logs = JSON.parse(localStorage.getItem('ww_logs') || '[]');
    let t0 = Date.now();

    function record(type) {
        let t1 = Date.now();
        logs.push({w: words[idx], l: type, ms: t1 - t0});
        localStorage.setItem('ww_logs', JSON.stringify(logs));
        
        idx = (idx + 1) % words.length;
        document.getElementById('word').innerText = words[idx];
        t0 = t1;
    }

    function downloadCSV() {
        let csv = "word,logic,ms\n" + logs.map(l => `${l.w},${l.l},${l.ms}`).join('\n');
        let blob = new Blob([csv], {type: 'text/csv'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'logs.csv';
        a.click();
    }
</script>
</body>
</html>
