<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Word World v25.1 Aha</title><style>
*{box-sizing:border-box}:root{--bg:#f6faf4;--green:#174a2b;--navy:#07345b;--orange:#fb7c13;--line:#dce7da}body{margin:0;background:var(--bg);color:#102016;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.app{max-width:760px;margin:auto;padding:12px 10px 104px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.logo{font-size:25px;font-weight:1000;color:var(--green);line-height:1}.logo small{display:block;font-size:12px;color:#64748b;margin-top:4px}.pillTop{background:white;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:1000;color:#174a2b}.hero{background:linear-gradient(135deg,#10466f,#062d50);color:white;border-radius:20px;padding:13px 15px;margin:10px 0}.hero h1{margin:0;font-size:20px}.hero p{margin:6px 0 0;font-weight:800;font-size:13px}.zone{background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 10px 28px #00000010;margin:10px 0}.zoneTitle{font-weight:1000;color:#0f3d25;font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}.meta span{display:inline-block;border-radius:999px;background:#e9f7ec;color:#166534;padding:5px 9px;font-weight:1000;font-size:11px;margin:2px}.sceneTitle{font-size:20px;font-weight:1000;color:#07345b;margin:10px 0 8px}.sentence{font-size:22px;line-height:1.45;font-weight:900;background:#f8fbff;border:2px solid #dbeafe;border-radius:18px;padding:14px;margin:10px 0}.chunk{color:#fb7c13;font-weight:1000}.question{font-size:19px;font-weight:1000;text-align:center;margin:8px 0 12px;color:#0f3d25}.answers{display:grid;grid-template-columns:1fr;gap:10px}.btn{border:2px solid #d8e7f7;border-radius:18px;background:#f8fbff;padding:15px 8px;font-size:18px;font-weight:1000;text-align:center;cursor:pointer}.btn small{display:block;font-size:12px;color:#64748b;font-weight:900;margin-top:3px}.btn.vs{border-color:#93c5fd}.btn.why{border-color:#fca5a5}.btn.so{border-color:#86efac}.btn.correct{background:#dcfce7;border-color:#22c55e;color:#166534}.btn.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b}.reveal{display:none}.reveal.show{display:block;animation:fade .35s ease-out}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.structureCard{border-radius:22px;padding:16px;margin-top:10px;text-align:center;color:white}.structureCard.VS{background:linear-gradient(135deg,#2563eb,#1e3a8a)}.structureCard.WHY{background:linear-gradient(135deg,#dc2626,#7f1d1d)}.structureCard.SO{background:linear-gradient(135deg,#16a34a,#14532d)}.symbol{font-size:38px;font-weight:1000;margin:8px 0}.compare{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin:12px 0}.node{background:white;color:#0f172a;border-radius:16px;padding:12px;font-size:16px;font-weight:1000;min-height:58px;display:flex;align-items:center;justify-content:center}.arrow{font-size:26px;font-weight:1000}.revealText{font-size:17px;font-weight:1000;line-height:1.45;margin-top:8px}.aha{background:#fff8e7;border:2px solid #f2c878;border-radius:18px;padding:14px;font-size:18px;font-weight:1000;line-height:1.45;margin-top:10px}.dash{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:var(--navy);color:white;border-radius:16px;padding:10px;margin-top:10px}.big{font-size:17px;font-weight:1000}.lbl{font-size:10px;color:#d5e9f7;font-weight:900}.footer{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 25%);padding:26px 10px 10px}.nav{max-width:760px;margin:auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.nav button{border:0;border-radius:18px;padding:13px 8px;font-weight:1000;font-size:14px}.secondary{background:#e5e7eb}.primary{background:var(--green);color:white}@media(max-width:520px){.logo{font-size:22px}.hero h1{font-size:17px}.zone{padding:12px;border-radius:18px;margin:8px 0}.sentence{font-size:17px;padding:12px}.sceneTitle{font-size:18px}.btn{font-size:15px;padding:13px 6px}.symbol{font-size:32px}.node{font-size:13px;padding:9px}.arrow{font-size:22px}.aha{font-size:15px}.revealText{font-size:14px}.big{font-size:15px}.lbl{font-size:9px}}</style></head><body>
<div class="app"><div class="top"><div class="logo">🌏 Word World<small>v25.1 Aha Prototype / 構造が見える瞬間</small></div><div class="pillTop" id="pill">1/9</div></div><section class="hero"><h1>Structure Discovery</h1><p>正解するためではなく、「あ、見えた！」を起こすためのLv02。</p></section><section class="zone"><div class="zoneTitle"><span>Scene</span><span id="theme"></span></div><div class="meta" id="meta"></div><div class="sceneTitle" id="sceneTitle"></div><div class="sentence" id="sentence"></div></section><section class="zone"><div class="zoneTitle">Choose</div><div class="question">この英文は、何をしている？</div><div class="answers" id="answers"></div></section><section class="zone reveal" id="revealZone"><div class="zoneTitle">Reveal</div><div class="structureCard" id="structureCard"><div class="symbol" id="symbol"></div><div class="compare"><div class="node" id="before"></div><div class="arrow" id="arrow"></div><div class="node" id="after"></div></div><div class="revealText" id="revealText"></div></div><div class="aha" id="aha"></div></section><div class="dash"><div><div class="big" id="correctCount">0</div><div class="lbl">正解</div></div><div><div class="big" id="tryCount">0</div><div class="lbl">試行</div></div><div><div class="big" id="rate">0%</div><div class="lbl">率</div></div></div></div><div class="footer"><div class="nav"><button class="secondary" id="prev">前へ</button><button class="secondary" id="reset">リセット</button><button class="primary" id="next">次へ</button></div></div>
<script>
let DATA,items=[],groups=[],idx=0,logs=[];const E=x=>document.getElementById(x);fetch('data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{DATA=d;items=d.items;groups=d.groups;idx=+localStorage.ww251idx||0;logs=JSON.parse(localStorage.ww251logs||'[]');bind();render()});function bind(){E('next').onclick=()=>{idx=(idx+1)%items.length;save();render()};E('prev').onclick=()=>{idx=(idx-1+items.length)%items.length;save();render()};E('reset').onclick=()=>{idx=0;logs=[];localStorage.removeItem('ww251idx');localStorage.removeItem('ww251logs');render()}}function save(){localStorage.ww251idx=idx;localStorage.ww251logs=JSON.stringify(logs)}function current(){return items[idx%items.length]}function render(){const it=current();E('pill').textContent=(idx+1)+'/'+items.length;E('theme').textContent=it.theme;E('meta').innerHTML='<span>'+it.id+'</span><span>'+it.chunk+'</span>';E('sceneTitle').textContent=it.title;E('sentence').innerHTML=highlight(it.sentence,it.chunk);E('revealZone').classList.remove('show');drawAnswers();dash()}function highlight(sentence,chunk){const esc=chunk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return sentence.replace(new RegExp(esc,'i'),m=>'<span class="chunk">'+m+'</span>')}function drawAnswers(){E('answers').innerHTML='';groups.forEach(g=>{const b=document.createElement('button');b.className='btn '+g[2];b.innerHTML='<b>'+g[1]+'</b><small>'+g[0]+'</small>';b.onclick=()=>answer(g[0],b);E('answers').appendChild(b)})}function answer(ans,btn){const it=current();const ok=ans===it.type;[...E('answers').children].forEach(b=>b.disabled=true);btn.classList.add(ok?'correct':'wrong');logs.push({id:it.id,type:it.type,answer:ans,ok,ts:new Date().toISOString()});save();reveal(ok);dash()}function reveal(ok){const it=current();E('structureCard').className='structureCard '+it.type;E('symbol').textContent=it.symbol;E('before').textContent=it.before;E('after').textContent=it.after;E('arrow').textContent=it.type==='VS'?'⇔':'→';E('revealText').textContent=it.reveal;E('aha').textContent=(ok?'正解。':'惜しい。')+' '+it.aha;E('revealZone').classList.add('show')}function dash(){const tries=logs.length,correct=logs.filter(x=>x.ok).length;E('tryCount').textContent=tries;E('correctCount').textContent=correct;E('rate').textContent=tries?Math.round(correct/tries*100)+'%':'0%'}</script></body></html>
