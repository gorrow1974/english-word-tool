<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word World v21 Lv01 Top Fullwidth</title>
<style>
*{box-sizing:border-box}
:root{--bg:#f6faf4;--green:#174a2b;--navy:#07345b;--orange:#fb7c13;--line:#dce7da}
body{margin:0;background:var(--bg);color:#102016;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
.app{max-width:1080px;margin:auto;padding:14px 10px 96px}
.top{display:flex;justify-content:space-between;gap:10px;align-items:center}
.logo{font-size:28px;font-weight:1000;color:var(--green);line-height:1}
.logo small{display:block;font-size:13px;color:#64748b;margin-top:4px}
.modePill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:1000;color:#174a2b;box-shadow:0 8px 18px #0001}
.hero{background:linear-gradient(135deg,#10466f,#062d50);color:white;border-radius:22px;padding:14px 16px;margin:12px 0}
.hero h1{margin:0;font-size:22px}.hero p{margin:6px 0 0;font-weight:800;font-size:14px}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.step{border:0;border-radius:14px;background:#e5e7eb;padding:10px;font-weight:1000;color:#64748b}
.step.active{background:var(--orange);color:white}
.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 10px 28px #00000010}
.lv1Wrap{display:grid;grid-template-rows:auto auto;gap:10px}
.wordCard{width:100%}
.meta{min-height:28px}.pill{display:inline-block;border-radius:999px;background:#e9f7ec;color:#166534;padding:6px 10px;font-weight:1000;font-size:12px;margin:2px}
.prompt{font-size:56px;font-weight:1000;text-align:center;color:#0f3d25;margin:28px 0 20px;line-height:1.08;letter-spacing:-.035em;white-space:pre-line}
.prompt.context{font-size:24px;text-align:left;letter-spacing:0;line-height:1.4;margin:24px 0}
.faint{opacity:.28}
.timer{background:#f8fafc;border:1px solid #dbe3df;border-radius:16px;padding:9px;margin-top:10px}
.timerTop{display:flex;justify-content:space-between;align-items:center;font-weight:1000;font-size:13px}
.timerTop b{font-size:20px;color:var(--orange)}
.barOut{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:7px}
.bar{height:100%;width:100%;background:var(--orange)}
.lv1Actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lv2Grid{display:grid;grid-template-columns:42% 58%;gap:10px;align-items:stretch}
.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;align-content:center}
.btn{border:2px solid #d8e7f7;border-radius:18px;background:#f8fbff;padding:14px 8px;font-size:16px;font-weight:1000;text-align:center;cursor:pointer}
.known{background:#dcfce7;border-color:#22c55e;color:#166534;font-size:24px;padding:26px 8px}
.unknown{background:#fee2e2;border-color:#ef4444;color:#991b1b;font-size:24px;padding:26px 8px}
.groupBtn.sel{background:#dbeafe;border-color:#3b82f6;color:#1d4ed8}
.check{grid-column:1/-1;background:var(--green);color:white}
.note{background:#fff8e7;border:2px solid #f2c878;border-radius:16px;padding:11px;font-weight:900;margin-top:12px;min-height:46px;font-size:14px}
.answerPanel{display:none;margin-top:12px;border-radius:18px;border:2px solid #cfe8d2;background:#f8fff9;padding:13px}
.answerPanel.show{display:block}
.answerTitle{font-weight:1000;color:#166534;margin-bottom:8px}
.sample{background:white;border-radius:12px;padding:10px;margin:8px 0;font-weight:800;line-height:1.45}
.arrow{white-space:pre-line;text-align:center;font-weight:1000;font-size:18px;line-height:1.35;color:#0f3d25}
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--navy);color:white;border-radius:17px;padding:12px;margin-top:12px}
.big{font-size:23px;font-weight:1000}.lbl{font-size:11px;color:#d5e9f7;font-weight:900}
.footer{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 25%);padding:26px 12px 10px}
.nav{max-width:1080px;margin:auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.nav button{border:0;border-radius:20px;padding:13px;font-weight:1000;font-size:15px}.secondary{background:#e5e7eb}.primary{background:var(--green);color:white}
.hide{display:none!important}
@media(max-width:820px){
.prompt{font-size:42px;margin:22px 0 16px}
.prompt.context{font-size:17px}
.card{padding:12px;border-radius:18px}
.known,.unknown{font-size:18px;padding:22px 6px}
.lv2Grid{grid-template-columns:43% 57%;gap:8px}
.actions{grid-template-columns:1fr 1fr;gap:7px}
.btn{font-size:13px;padding:10px 5px}
.timerTop{font-size:12px}.timerTop b{font-size:16px}
.dash{grid-template-columns:repeat(4,1fr);gap:5px;padding:9px}.big{font-size:17px}.lbl{font-size:10px}
.hero h1{font-size:18px}.arrow{font-size:15px}.sample{font-size:13px}
.steps{grid-template-columns:repeat(3,1fr)}.step{font-size:12px;padding:8px 4px}.nav{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="logo">🌏 Word World<small>v21 / Lv01 3秒・上段フル幅</small></div>
    <div class="modePill" id="modePill">Lv01</div>
  </div>
  <section class="hero">
    <h1 id="heroTitle">Lv01：語彙認識</h1>
    <p id="heroText">上段で単語を見る。下段で知ってる / 知らないを押す。</p>
  </section>
  <div class="steps">
    <button class="step active" data-mode="1">Lv01</button>
    <button class="step" data-mode="2">Lv02</button>
    <button class="step" data-mode="25">Lv02.5</button>
  </div>

  <div id="main"></div>

  <div class="dash">
    <div><div class="big" id="modeDash">Lv01</div><div class="lbl">現在</div></div>
    <div><div class="big" id="pos">1/7</div><div class="lbl">位置</div></div>
    <div><div class="big" id="rate">0%</div><div class="lbl">通過率</div></div>
    <div><div class="big" id="attempts">0</div><div class="lbl">試行</div></div>
  </div>
</div>
<div class="footer"><div class="nav"><button class="secondary" id="prev">前へ</button><button class="secondary" id="reset">リセット</button><button class="primary" id="next">次へ</button></div></div>

<script>
let DATA,items=[],groups=[],logs=[],idx=0,mode=1,timer=null,t0=0,limit=3,selected=new Set(),fadeStage=0;
const MODE_LIMITS={1:3,2:15,25:15};
const E=x=>document.getElementById(x);
fetch('data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{DATA=d;items=d.items;groups=d.uiGroups;logs=JSON.parse(localStorage.ww21toplogs||'[]');idx=Number(localStorage.ww21topidx||0);mode=Number(localStorage.ww21topmode||1);bind();render();});
function bind(){
 E('next').onclick=next;E('prev').onclick=prev;E('reset').onclick=()=>{localStorage.removeItem('ww21toplogs');localStorage.removeItem('ww21topidx');localStorage.removeItem('ww21topmode');logs=[];idx=0;mode=1;render()};
 document.querySelectorAll('.step').forEach(b=>b.onclick=()=>{mode=Number(b.dataset.mode);render()});
}
function current(){return items[idx%items.length]}
function baseWordCard(it, context=false){
 return `<section class="card wordCard"><div class="meta" id="meta"><span class="pill">${it.id}</span><span class="pill">${mode===25?'Lv02.5':'Lv0'+mode}</span></div><div class="prompt ${context?'context':''}" id="prompt">${context?getFadingText(it):it.surface}</div><div class="timer"><div class="timerTop"><span>認識時間</span><span><b id="remain">3.0</b> 秒</span></div><div class="barOut"><div class="bar" id="bar"></div></div></div></section>`;
}
function render(){
 const it=current(); selected=new Set();
 document.querySelectorAll('.step').forEach(b=>b.classList.toggle('active',Number(b.dataset.mode)===mode));
 const label=mode===25?'Lv02.5':'Lv0'+mode;
 E('modePill').textContent=label;E('modeDash').textContent=label;E('pos').textContent=(idx%items.length+1)+'/'+items.length;
 if(mode===1){
  E('heroTitle').textContent='Lv01：語彙認識';
  E('heroText').textContent='3秒以内。上段で単語、下段で知ってる / 知らない。';
  E('main').innerHTML=`<div class="lv1Wrap">${baseWordCard(it,false)}<section class="card"><div class="lv1Actions" id="actions"></div><div class="note" id="note">3秒以内。見た瞬間に反応。</div></section></div>`;
  drawLv1();
 }
 if(mode===2){
  E('heroTitle').textContent='Lv02：論理トリガー即時検知';
  E('heroText').textContent='この語が呼び出す構造を7分類から選ぶ。';
  E('main').innerHTML=`<div class="lv2Grid">${baseWordCard(it,false)}${rightPanel()}</div>`;
  drawGroupButtons(answerLv2);
 }
 if(mode===25){
  E('heroTitle').textContent='Lv02.5：フェーディング訓練';
  E('heroText').textContent='シグナルが薄くなる / 消える状態でも構造を読む。';
  E('main').innerHTML=`<div class="lv2Grid">${baseWordCard(it,true)}${rightPanel()}</div>`;
  drawGroupButtons(answerLv25);
 }
 dash(); start();
}
function rightPanel(){return `<section class="card"><div class="actions" id="actions"></div><div class="note" id="note">正解カテゴリを選ぶ。</div><div class="answerPanel" id="answerPanel"><div class="answerTitle" id="answerTitle"></div><div class="sample" id="sample"></div><div class="arrow" id="arrow"></div></div></section>`}
function getFadingText(it){
 const arr=[it.fadingVisible,it.fadingFaint,it.fadingHidden],txt=arr[fadeStage%3];
 if(fadeStage%3===1){const m=txt.match(/\((.*?)\)/);if(m)return txt.replace('('+m[1]+')','<span class="faint">'+m[1]+'</span>')}
 return txt;
}
function drawLv1(){E('actions').innerHTML='';[['known','知ってる'],['unknown','知らない']].forEach(([cls,txt])=>{let b=document.createElement('button');b.className='btn '+cls;b.textContent=txt;b.onclick=()=>answerLv1(cls);E('actions').appendChild(b)})}
function drawGroupButtons(handler){
 E('actions').innerHTML='';
 groups.forEach(g=>{let b=document.createElement('button');b.className='btn groupBtn';b.innerHTML='<b>'+g.label+'</b><br><small>'+g.jp+'</small>';b.onclick=()=>{if(selected.has(g.id)){selected.delete(g.id);b.classList.remove('sel')}else{selected.add(g.id);b.classList.add('sel')}};E('actions').appendChild(b)});
 let ok=document.createElement('button');ok.className='btn check';ok.textContent='OK';ok.onclick=handler;E('actions').appendChild(ok);
}
function start(){if(timer)clearInterval(timer);limit=MODE_LIMITS[mode]||15;E('remain').textContent=limit.toFixed(1);t0=Date.now();timer=setInterval(()=>{let s=(Date.now()-t0)/1000,r=Math.max(0,limit-s),p=Math.max(0,r/limit*100);E('remain').textContent=r.toFixed(1);E('bar').style.width=p+'%';E('bar').style.background=p>50?'#fb7c13':p>20?'#facc15':'#ef4444';if(r<=0)clearInterval(timer)},100)}
function sec(){let s=(Date.now()-t0)/1000;if(timer)clearInterval(timer);return +s.toFixed(2)}
function setEq(a,b){return a.length===b.length&&a.every(x=>b.includes(x))}
function answerLv1(resp){const it=current(),t=sec();logs.push({mode:'Lv01',itemId:it.id,response:resp,pass:(resp==='known'&&t<=limit),responseTimeSec:t,timestamp:new Date().toISOString()});save();E('note').textContent=resp==='known'?'記録しました。':'未学習として記録しました。';setTimeout(next,320);dash();}
function showAnswer(ok){const it=current();E('answerTitle').textContent='正解：'+it.group.join(' / ')+'　詳細：'+it.tags.join('・');E('sample').textContent='例文：'+it.example;E('arrow').textContent=it.arrow;E('answerPanel').classList.add('show');E('note').textContent=ok?'OK。単語→構造→文脈がつながっています。':'もう一歩。シグナルではなく文脈を確認しよう。'}
function answerLv2(){const it=current(),t=sec(),sel=[...selected],ok=setEq(sel.sort(),[...it.group].sort())&&t<=limit;logs.push({mode:'Lv02',itemId:it.id,response:sel,correct:it.group,pass:ok,responseTimeSec:t,timestamp:new Date().toISOString()});save();showAnswer(ok);dash();}
function answerLv25(){const it=current(),t=sec(),sel=[...selected],ok=setEq(sel.sort(),[...it.group].sort())&&t<=limit;logs.push({mode:'Lv02.5',stage:fadeStage%3,itemId:it.id,response:sel,correct:it.group,pass:ok,responseTimeSec:t,timestamp:new Date().toISOString()});save();showAnswer(ok);dash();}
function next(){if(mode===25){fadeStage++; if(fadeStage%3!==0){render();return}} idx=(idx+1)%items.length; save(); render();}
function prev(){idx=(idx-1+items.length)%items.length; save(); render();}
function save(){localStorage.ww21toplogs=JSON.stringify(logs);localStorage.ww21topidx=idx;localStorage.ww21topmode=mode}
function dash(){const label=mode===25?'Lv02.5':'Lv0'+mode;let ls=logs.filter(l=>l.mode===label),ok=ls.filter(l=>l.pass).length;E('attempts').textContent=ls.length;E('rate').textContent=ls.length?Math.round(ok/ls.length*100)+'%':'0%'}
</script>
</body>
</html>
