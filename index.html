<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CLES Word World v1.0 50</title>
<style>
*{box-sizing:border-box}:root{--bg:#f7faf4;--ink:#102016;--muted:#64748b;--green:#174a2b;--navy:#07345b;--orange:#fb7c13;--line:#dce7da;--soft:#fff8e7}body{margin:0;background:radial-gradient(circle at top,#fff 0,#f7faf4 50%,#edf7ef 100%);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.app{min-height:100vh;max-width:1040px;margin:0 auto;padding:18px;display:grid;grid-template-rows:auto 1fr auto;gap:14px}.header{display:flex;justify-content:space-between;align-items:center;gap:12px}.logo{font-size:26px;font-weight:1000;color:var(--green);line-height:1}.logo small{display:block;font-size:12px;color:var(--muted);margin-top:5px}.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-weight:1000;color:var(--green);box-shadow:0 8px 22px #0000000c}.main{display:flex;flex-direction:column;justify-content:center;gap:14px}.intro,.scene,.timer{background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:0 18px 50px #00000010}.intro{padding:26px 30px}.intro h1{margin:0 0 8px;color:var(--navy);font-size:34px;letter-spacing:-.04em}.intro p{font-size:18px;font-weight:900;line-height:1.7;margin:10px 0;color:#334155}.intro .note{background:var(--soft);border:2px solid #f2c878;border-radius:20px;padding:14px;margin-top:14px}.startBtn{margin-top:16px;border:0;border-radius:18px;background:var(--green);color:#fff;padding:15px 24px;font-size:17px;font-weight:1000}.scene{padding:24px 30px}.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:10px}.theme{font-weight:1000;color:var(--navy)}.badges span{display:inline-block;background:#e9f7ec;color:#166534;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:1000;margin-left:5px}.title{font-size:28px;color:var(--navy);font-weight:1000;margin:0 0 18px;letter-spacing:-.03em}.prompt{background:var(--soft);border:2px solid #f2c878;border-radius:22px;padding:18px 20px}.sentence{font-size:29px;line-height:1.5;font-weight:950}.chunk{color:var(--orange);background:#fff3df;border-radius:10px;padding:0 6px}.jp{border-top:1px dashed #e5c36c;margin-top:14px;padding-top:12px;color:#475569;font-size:17px;line-height:1.55;font-weight:900}.questionTitle{font-size:18px;font-weight:1000;color:#334155;margin:4px 0 0}.choose{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.choice{border:2px solid #dbe3df;background:#fff;border-radius:18px;min-height:68px;padding:10px 4px;font-size:14px;font-weight:1000;cursor:pointer;box-shadow:0 10px 24px #0000000b}.choice small{display:block;color:#64748b;font-size:10px;margin-top:3px}.choice.correct{background:#dcfce7;color:#166534;border-color:#22c55e}.choice.correctAnswer{background:#dcfce7!important;color:#166534!important;border-color:#22c55e!important;box-shadow:0 0 0 4px #bbf7d0}.choice.wrong{background:#fee2e2;color:#991b1b;border-color:#ef4444}.timer{padding:11px 14px}.timerTop{display:flex;justify-content:space-between;font-weight:1000;color:#334155}.timerTop b{font-size:22px;color:var(--orange)}.barOut{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.bar{height:100%;width:100%;background:var(--orange);transition:width .08s linear}.footer{display:flex;justify-content:space-between;align-items:center;gap:10px}.footer button,.modalActions button{border:0;border-radius:16px;padding:12px 17px;font-size:14px;font-weight:1000}.secondary{background:#e5e7eb;color:#334155}.primary{background:var(--green);color:#fff}.stats{font-size:13px;font-weight:1000;color:#64748b;text-align:center}.logbar{display:flex;gap:6px;align-items:center}.logbtn{border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--green);padding:8px 10px;font-size:11px;font-weight:1000}.overlay{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;padding:20px;z-index:10;backdrop-filter:blur(5px)}.overlay.show{display:flex}.modal{width:min(780px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:32px;box-shadow:0 40px 120px #00000040;padding:24px}.feedback{font-size:34px;font-weight:1000;text-align:center;margin-bottom:12px}.feedback.ok{color:#166534}.feedback.ng{color:#991b1b}.structure{color:#fff;border-radius:26px;padding:20px;text-align:center;background:linear-gradient(135deg,#07345b,#174a2b)}.symbol{font-size:42px;font-weight:1000;margin-bottom:10px}.compare{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin:12px 0}.node{background:#fff;color:#0f172a;border-radius:16px;padding:13px;min-height:62px;display:flex;align-items:center;justify-content:center;font-weight:1000}.arrow{font-size:30px;font-weight:1000}.reveal{font-size:17px;font-weight:1000;line-height:1.45}.supportBox,.aha,.learnBox,.reflectionBox,.summaryBox{border-radius:20px;padding:14px;margin-top:12px;font-weight:1000;line-height:1.55}.supportBox{background:var(--soft);border:2px solid #f2c878;color:#0f172a}.supportEn{font-size:17px;margin-bottom:8px}.supportJa{color:#475569;font-size:14px}.aha{background:#eff6ff;border:2px solid #bfdbfe;color:#1e3a8a;font-size:18px}.learnBox{background:#f8fafc;border:2px solid #dbe3df;color:#0f172a}.learnTitle{font-size:15px;color:#334155;margin-bottom:8px}.reflectionBox{background:#ecfdf5;border:2px solid #86efac;color:#064e3b}.reflectBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.reflectBtn{border:2px solid #bbf7d0;background:#fff;border-radius:16px;padding:12px;font-weight:1000}.reflectBtn.selected{background:#dcfce7;border-color:#22c55e;color:#166534}.summaryBox{background:#fff;border:2px solid var(--line);color:#102016}.miniGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.miniCard{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px;text-align:center}.miniCard b{display:block;font-size:22px;color:var(--green)}.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.hidden{display:none!important}@media(max-width:760px){.app{padding:12px}.logo{font-size:22px}.intro h1{font-size:28px}.scene{padding:18px}.title{font-size:23px}.sentence{font-size:20px}.jp{font-size:15px}.choose{grid-template-columns:repeat(2,1fr)}.choice{font-size:14px;min-height:58px}.footer{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 25%);padding-top:14px}.modal{border-radius:24px;padding:16px}.feedback{font-size:28px}.miniGrid{grid-template-columns:1fr}.reflectBtns{grid-template-columns:1fr}}
</style></head>
<body><div class="app"><header class="header"><div class="logo">🌏 CLES Word World<small>v1.0 / First Student Edition / 50問</small></div><div class="pill" id="counter">Level2</div></header><main class="main"><section class="intro" id="intro"><h1>Level2<br>Reading Structure</h1><p>英文には「役割」があります。この問題では、筆者が一番伝えたい読み方を選びます。</p><div class="note">正解することだけが目的ではありません。<br><b>なぜそう読んだのか</b>を理解することが目的です。</div><p>目標：1日10問。約5〜10分。</p><button class="startBtn" id="start">START</button></section><section class="scene hidden" id="game"><div class="meta"><div class="theme" id="theme">🌍 Scene</div><div class="badges" id="badges"></div></div><h1 class="title" id="title"></h1><div class="prompt"><div class="sentence" id="sentence"></div><div class="jp" id="jp"></div></div></section><div class="questionTitle hidden" id="questionTitle">この英文は、どの読み方が一番近い？</div><section class="choose hidden" id="choices"></section><section class="timer hidden" id="timerBox"><div class="timerTop"><span>認識時間</span><span><b id="remain">10.0</b> 秒</span></div><div class="barOut"><div class="bar" id="bar"></div></div></section></main><footer class="footer"><button class="secondary" id="prev">前へ</button><div class="logbar"><div class="stats" id="stats">ログ 0問</div><button class="logbtn" id="shuffle">シャッフル</button><button class="logbtn" id="exportCsv">CSV</button><button class="logbtn" id="exportJson">JSON</button><button class="logbtn" id="clearLogs">消去</button></div><button class="primary" id="next">次へ</button></footer></div>
<div class="overlay" id="overlay"><div class="modal"><div class="feedback" id="feedback"></div><div class="structure"><div class="symbol" id="symbol"></div><div class="compare"><div class="node" id="before"></div><div class="arrow" id="arrow"></div><div class="node" id="after"></div></div><div class="reveal" id="reveal"></div></div><div class="supportBox"><div class="supportEn" id="supportEn"></div><div class="supportJa" id="supportJa"></div></div><div class="aha" id="aha"></div><div class="learnBox"><div class="learnTitle">あなたの読み方</div><div id="learnText"></div></div><div class="reflectionBox"><div>今回の理解は？</div><div class="reflectBtns"><button class="reflectBtn" data-reflect="clear">少し見えてきた</button><button class="reflectBtn" data-reflect="hard">まだ難しい</button></div></div><div class="summaryBox hidden" id="dailySummary"><div class="learnTitle">今日の結果</div><div class="miniGrid"><div class="miniCard">計画達成率<b id="planRate">--%</b></div><div class="miniCard">理解度<b id="masteryRate">--%</b></div><div class="miniCard">計画との差<b id="gapRate">--%</b></div></div><div id="nextAdvice" style="margin-top:10px"></div></div><div class="modalActions"><button class="secondary" id="close">もう一度見る</button><button class="primary" id="modalNext">次へ</button></div></div></div>
<script>
let DATA,items=[],groups=[],idx=0,logs=[],timer=null,t0=0,limit=10,order=[];const E=x=>document.getElementById(x);
fetch('data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{DATA=d;items=d.items;groups=d.groups;idx=+localStorage.clesv1idx||0;logs=JSON.parse(localStorage.clesv1logs||'[]');order=JSON.parse(localStorage.clesv1order||'null')||makeOrder(items.length);bind();updateStats();});
function bind(){E('start').onclick=()=>{E('intro').classList.add('hidden');E('game').classList.remove('hidden');E('choices').classList.remove('hidden');E('timerBox').classList.remove('hidden');E('questionTitle').classList.remove('hidden');render()};E('next').onclick=next;E('modalNext').onclick=next;E('prev').onclick=()=>{idx=(idx-1+order.length)%order.length;save();render()};E('close').onclick=()=>E('overlay').classList.remove('show');E('shuffle').onclick=reshuffle;E('exportCsv').onclick=exportCsv;E('exportJson').onclick=exportJson;E('clearLogs').onclick=()=>{if(confirm('ログを消去しますか？')){logs=[];save();updateStats();}};document.querySelectorAll('.reflectBtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.reflectBtn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');const last=logs[logs.length-1];if(last){last.reflection=b.dataset.reflect;save();updateStats();}})}
function makeOrder(n){const buckets={};items.forEach((it,i)=>{(buckets[it.type]||(buckets[it.type]=[])).push(i)});Object.values(buckets).forEach(a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}});const result=[],types=Object.keys(buckets);let last='';while(result.length<n){const av=types.filter(t=>buckets[t].length&&t!==last);const pool=av.length?av:types.filter(t=>buckets[t].length);if(!pool.length)break;const t=pool[Math.floor(Math.random()*pool.length)];result.push(buckets[t].pop());last=t}return result}
function reshuffle(){order=makeOrder(items.length);idx=0;save();render()}function save(){localStorage.clesv1idx=idx;localStorage.clesv1logs=JSON.stringify(logs);localStorage.clesv1order=JSON.stringify(order)}function current(){return items[order[idx%order.length]]}
function h(s,c){if(!c)return s;const esc=c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return s.replace(new RegExp(esc,'i'),m=>'<span class="chunk">'+m+'</span>')}
function render(){const it=current();E('overlay').classList.remove('show');E('counter').textContent=(idx+1)+'/'+items.length;E('theme').textContent='🌍 '+it.theme;E('badges').innerHTML='<span>'+it.id+'</span><span>'+it.chunk+'</span>';E('title').textContent=it.title;E('sentence').innerHTML=h(it.sentence,it.chunk);E('jp').textContent=it.jp;drawChoices();updateStats();startTimer()}
function drawChoices(){E('choices').innerHTML='';groups.forEach(g=>{const b=document.createElement('button');b.className='choice '+g.class;b.innerHTML='<b>'+g.label+'</b><small>'+g.id+'</small>';b.onclick=()=>answer(g.id,b);E('choices').appendChild(b)})}
function startTimer(){if(timer)clearInterval(timer);limit=10;t0=Date.now();E('remain').textContent=limit.toFixed(1);E('bar').style.width='100%';E('bar').style.background='var(--orange)';timer=setInterval(()=>{const s=(Date.now()-t0)/1000,r=Math.max(0,limit-s),p=Math.max(0,r/limit*100);E('remain').textContent=r.toFixed(1);E('bar').style.width=p+'%';E('bar').style.background=p>50?'#fb7c13':p>20?'#facc15':'#ef4444';if(r<=0)clearInterval(timer)},100)}
function elapsed(){const s=(Date.now()-t0)/1000;if(timer)clearInterval(timer);return +s.toFixed(2)}function labelOf(id){const g=groups.find(x=>x.id===id);return g?g.label:id}
function purposeOf(id){return {'WHAT':'「テーマや主語などの主体を決める」ときに使う、つまり「この文は何について述べているのか」を見る読み方です。','VS':'二つの内容の違い・ズレ・対立を見る読み方です。','WHY':'出来事の原因や理由を見る読み方です。','SO':'前の情報から導かれる結果や結論を見る読み方です。','EX':'抽象的な説明を、具体例で分かりやすくする読み方です。','DATA':'研究・調査・数字・記録など、主張を支える根拠を見る読み方です。','DECIDE':'情報をもとに、どうするべきかという判断や提案を見る読み方です。'}[id]||'英文の役割を見る読み方です。'}
function feedbackFor(correct,chosen,it){if(correct===chosen)return 'この読み方でOKです。ポイントは、"'+it.chunk+'" の前後を見ることです。';return 'あなたは「'+labelOf(chosen)+'」を選びました。<br><br>'+purposeOf(chosen)+'<br><br>でも今回は、「'+labelOf(chosen)+'」ではありません。<br>「'+it.before+'」と「'+it.after+'」の関係を見ると、今回は「'+labelOf(correct)+'」が一番自然です。<br><br>ポイントは、"'+it.chunk+'" の前後を見ることです。'}
function calcMastery(ok,t){const speed=Math.max(0,Math.min(1,(10-t)/10));return Math.max(0,Math.min(100,(ok?55:15)+(ok?Math.round(speed*30):Math.round(speed*10))))}
function answer(ans,btn){const it=current(),t=elapsed(),ok=ans===it.type,mastery=calcMastery(ok,t);[...E('choices').children].forEach(b=>{b.disabled=true;if(b.innerHTML.includes('<small>'+it.type+'</small>'))b.classList.add('correctAnswer')});btn.classList.add(ok?'correct':'wrong');const log={ts:new Date().toISOString(),session_id:getSessionId(),item_index:idx+1,item_id:it.id,type:it.type,theme:it.theme,title:it.title,chunk:it.chunk,answer:ans,correct_answer:it.type,ok:ok,time_sec:t,timeout:t>limit,mastery_score:mastery,sentence:it.sentence,jp:it.jp,feedback:feedbackFor(it.type,ans,it)};logs.push(log);save();showModal(ok,ans,mastery);updateStats()}
function showModal(ok,ans,mastery){const it=current();document.querySelectorAll('.reflectBtn').forEach(x=>x.classList.remove('selected'));E('feedback').className='feedback '+(ok?'ok':'ng');E('feedback').textContent=ok?'正解！':'惜しい！';E('symbol').textContent=it.symbol;E('before').textContent=it.before;E('after').textContent=it.after;E('arrow').textContent=it.type==='VS'?'⇔':'→';E('reveal').textContent=it.reveal;E('supportEn').textContent=it.sentence;E('supportJa').textContent='日本語：'+it.jp;E('aha').textContent=ok?it.aha:'正解は「'+labelOf(it.type)+'」です。';E('learnText').innerHTML=feedbackFor(it.type,ans,it);updateDailySummary();E('overlay').classList.add('show')}
function getSessionId(){let s=localStorage.clesv1session;if(!s){s='S'+Date.now();localStorage.clesv1session=s}return s}function next(){idx++;if(idx>=order.length){order=makeOrder(items.length);idx=0}save();render()}function todayLogs(){const d=new Date().toISOString().slice(0,10);return logs.filter(x=>(x.ts||'').slice(0,10)===d)}
function updateDailySummary(){const plan=DATA.daily_plan.questions,target=DATA.daily_plan.target_mastery,tl=todayLogs();if(tl.length<5){E('dailySummary').classList.add('hidden');return}E('dailySummary').classList.remove('hidden');const done=tl.length,planRate=Math.min(100,Math.round(done/plan*100));const mastery=Math.round(tl.reduce((a,b)=>a+(+b.mastery_score||0),0)/done);const gap=mastery-target;E('planRate').textContent=planRate+'%';E('masteryRate').textContent=mastery+'%';E('gapRate').textContent=(gap>=0?'+':'')+gap+'%';const by={};tl.forEach(x=>{by[x.type]=by[x.type]||{n:0,ok:0};by[x.type].n++;if(x.ok)by[x.type].ok++});let weak=Object.keys(by).sort((a,b)=>(by[a].ok/by[a].n)-(by[b].ok/by[b].n))[0]||'WHY';E('nextAdvice').textContent='今日は「'+labelOf(weak)+'」が少し弱めです。明日はこの型を3問多めにやりましょう。'}
function updateStats(){const tl=todayLogs(),tries=logs.length;if(!tries){E('stats').textContent='ログ 0問';return}const m=Math.round(logs.reduce((a,b)=>a+(+b.mastery_score||0),0)/tries);E('stats').textContent='理解 '+m+'% / 今日 '+tl.length+'/'+DATA.daily_plan.questions+'問'}
function download(name,text,type){const blob=new Blob([text],{type:type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href)}function exportJson(){download('cles_word_world_log.json',JSON.stringify(logs,null,2),'application/json')}function csvEsc(v){return '"'+String(v==null?'':v).replaceAll('"','""').replaceAll('<br>',' ')+'"'}function exportCsv(){const cols=['ts','session_id','item_index','item_id','type','theme','title','chunk','answer','correct_answer','ok','time_sec','timeout','mastery_score','reflection','sentence','jp','feedback'];const rows=[cols.join(',')].concat(logs.map(r=>cols.map(c=>csvEsc(r[c])).join(',')));download('cles_word_world_log.csv',rows.join('\n'),'text/csv')}
</script></body></html>
