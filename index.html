<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Word World v28</title><style>
*{box-sizing:border-box}:root{--bg:#f8fbf5;--ink:#0f1f16;--muted:#64748b;--green:#174a2b;--navy:#07345b;--orange:#fb7c13;--line:#dde8d9}html,body{height:100%}body{margin:0;background:radial-gradient(circle at top,#fff 0,#f8fbf5 52%,#edf7eb 100%);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}.app{height:100vh;max-width:980px;margin:0 auto;padding:20px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}.header{display:flex;justify-content:space-between;align-items:center}.logo{font-size:26px;font-weight:1000;color:var(--green);letter-spacing:-.04em;line-height:1}.logo small{display:block;font-size:12px;color:var(--muted);letter-spacing:0;margin-top:5px}.counter{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-weight:1000;color:var(--green)}.main{min-height:0;display:flex;flex-direction:column;justify-content:center;gap:22px}.scene{background:#fff;border:1px solid var(--line);border-radius:34px;padding:36px 42px;box-shadow:0 24px 80px #00000012}.meta{display:flex;justify-content:space-between;gap:12px;margin-bottom:34px}.theme{color:var(--navy);font-weight:1000}.badges span{display:inline-block;border-radius:999px;background:#eef8ee;color:#166534;padding:6px 10px;font-weight:1000;font-size:11px;margin-left:5px}.title{font-size:20px;color:var(--muted);font-weight:1000;margin:0 0 34px;text-align:center}.sentence{max-width:850px;margin:0 auto;text-align:center;font-size:34px;line-height:1.62;font-weight:950;letter-spacing:-.02em}.chunk{color:var(--orange);background:#fff4df;border-radius:12px;padding:0 7px}.choose{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.choice{border:2px solid #d8e7f7;border-radius:999px;padding:19px 10px;background:#fff;box-shadow:0 16px 40px #0000000f;font-size:22px;font-weight:1000;cursor:pointer;min-height:76px;transition:.12s}.choice:hover{transform:translateY(-2px)}.choice small{display:block;font-size:11px;color:var(--muted);font-weight:1000;margin-top:3px}.choice.vs{border-color:#93c5fd}.choice.why{border-color:#fca5a5}.choice.so{border-color:#86efac}.choice.correct{background:#dcfce7;color:#166534;border-color:#22c55e}.choice.wrong{background:#fee2e2;color:#991b1b;border-color:#ef4444}.timer{background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px 12px;box-shadow:0 10px 30px #0000000c}.timerTop{display:flex;justify-content:space-between;align-items:center;font-weight:1000;color:#334155}.timerTop b{font-size:21px;color:var(--orange)}.barOut{height:11px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.bar{height:100%;width:100%;background:var(--orange);transition:width .08s linear}.footer{display:flex;justify-content:space-between;align-items:center}.footer button,.modalActions button{border:0;border-radius:18px;padding:13px 20px;font-weight:1000;font-size:14px}.secondary{background:#e5e7eb;color:#334155}.primary{background:var(--green);color:#fff}.stats{color:#64748b;font-size:13px;font-weight:1000}.overlay{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;padding:22px;z-index:10;backdrop-filter:blur(6px)}.overlay.show{display:flex}.modal{width:min(720px,100%);background:#fff;border-radius:34px;box-shadow:0 40px 120px #00000040;padding:30px}.feedback{font-size:38px;font-weight:1000;text-align:center;margin-bottom:16px;letter-spacing:-.04em}.feedback.ok{color:#166534}.feedback.ng{color:#991b1b}.structure{color:#fff;border-radius:30px;padding:24px;text-align:center}.structure.VS{background:linear-gradient(135deg,#2563eb,#1e3a8a)}.structure.WHY{background:linear-gradient(135deg,#dc2626,#7f1d1d)}.structure.SO{background:linear-gradient(135deg,#16a34a,#14532d)}.symbol{font-size:44px;font-weight:1000;margin-bottom:14px}.compare{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin:14px 0}.node{background:#fff;color:#0f172a;border-radius:18px;padding:15px 12px;min-height:68px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:1000}.arrow{font-size:34px;font-weight:1000}.reveal{font-size:18px;font-weight:1000;line-height:1.45;margin-top:13px}.aha{background:#fff8e7;border:2px solid #f2c878;border-radius:20px;padding:16px;font-size:20px;font-weight:1000;line-height:1.45;margin-top:16px}.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}@media(max-width:760px){body{overflow:auto}.app{height:auto;min-height:100vh;padding:12px;gap:12px}.logo{font-size:22px}.main{justify-content:flex-start;gap:12px}.scene{border-radius:24px;padding:24px 18px}.meta{margin-bottom:22px}.title{font-size:16px;margin-bottom:22px}.sentence{font-size:21px;line-height:1.58;text-align:left}.choose{gap:8px}.choice{min-height:72px;border-radius:18px;font-size:16px;padding:14px 4px}.choice small{font-size:10px}.footer{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 25%);padding-top:18px}.modal{border-radius:26px;padding:18px}.feedback{font-size:30px}.symbol{font-size:36px}.node{font-size:14px;min-height:58px}.aha{font-size:16px}.reveal{font-size:15px}}
</style></head><body><div class="app"><header class="header"><div class="logo">🌏 Word World<small>v28 / 英語を読む。構造が見える。</small></div><div class="counter" id="counter">1/30</div></header><main class="main"><section class="scene"><div class="meta"><div class="theme" id="theme"></div><div class="badges" id="badges"></div></div><h1 class="title" id="title"></h1><div class="sentence" id="sentence"></div></section><section class="choose" id="choices"></section><section class="timer"><div class="timerTop"><span>認識時間</span><span><b id="remain">10.0</b> 秒</span></div><div class="barOut"><div class="bar" id="bar"></div></div></section></main><footer class="footer"><button class="secondary" id="prev">前へ</button><div class="stats" id="stats">0%</div><button class="primary" id="next">次へ</button></footer></div><div class="overlay" id="overlay"><div class="modal"><div class="feedback" id="feedback"></div><div class="structure" id="structure"><div class="symbol" id="symbol"></div><div class="compare"><div class="node" id="before"></div><div class="arrow" id="arrow"></div><div class="node" id="after"></div></div><div class="reveal" id="reveal"></div></div><div class="aha" id="aha"></div><div class="modalActions"><button class="secondary" id="close">もう一度読む</button><button class="primary" id="modalNext">次へ</button></div></div></div><script>
let DATA,items=[],groups=[],idx=0,logs=[],timer=null,t0=0,limit=10;const E=x=>document.getElementById(x);fetch('data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{DATA=d;items=d.items;groups=d.groups;idx=+localStorage.ww28idx||0;logs=JSON.parse(localStorage.ww28logs||'[]');bind();render()});function bind(){E('next').onclick=next;E('modalNext').onclick=next;E('prev').onclick=()=>{idx=(idx-1+items.length)%items.length;save();render()};E('close').onclick=()=>E('overlay').classList.remove('show')}function save(){localStorage.ww28idx=idx;localStorage.ww28logs=JSON.stringify(logs)}function current(){return items[idx%items.length]}function h(s,c){if(!c)return s;const esc=c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return s.replace(new RegExp(esc,'i'),m=>'<span class="chunk">'+m+'</span>')}function render(){const it=current();E('overlay').classList.remove('show');E('counter').textContent=(idx+1)+'/'+items.length;E('theme').textContent='🌍 '+(it.theme||'Scene');E('badges').innerHTML='<span>'+it.id+'</span><span>'+it.chunk+'</span>';E('title').textContent=it.title;E('sentence').innerHTML=h(it.sentence,it.chunk);drawChoices();updateStats();startTimer()}function drawChoices(){E('choices').innerHTML='';groups.forEach(g=>{const b=document.createElement('button');b.className='choice '+g.class;b.innerHTML='<b>'+g.label+'</b><small>'+g.id+'</small>';b.onclick=()=>answer(g.id,b);E('choices').appendChild(b)})}function startTimer(){if(timer)clearInterval(timer);limit=10;t0=Date.now();E('remain').textContent=limit.toFixed(1);E('bar').style.width='100%';E('bar').style.background='var(--orange)';timer=setInterval(()=>{const s=(Date.now()-t0)/1000,r=Math.max(0,limit-s),p=Math.max(0,r/limit*100);E('remain').textContent=r.toFixed(1);E('bar').style.width=p+'%';E('bar').style.background=p>50?'#fb7c13':p>20?'#facc15':'#ef4444';if(r<=0)clearInterval(timer)},100)}function elapsed(){const s=(Date.now()-t0)/1000;if(timer)clearInterval(timer);return +s.toFixed(2)}function answer(ans,btn){const it=current(),t=elapsed(),ok=ans===it.type;[...E('choices').children].forEach(b=>b.disabled=true);btn.classList.add(ok?'correct':'wrong');logs.push({id:it.id,type:it.type,answer:ans,ok,time:t,ts:new Date().toISOString()});save();showModal(ok);updateStats()}function showModal(ok){const it=current();E('feedback').className='feedback '+(ok?'ok':'ng');E('feedback').textContent=ok?'正解！':'惜しい！';E('structure').className='structure '+it.type;E('symbol').textContent=it.symbol;E('before').textContent=it.before;E('after').textContent=it.after;E('arrow').textContent=it.type==='VS'?'⇔':'→';E('reveal').textContent=it.reveal;E('aha').textContent=it.aha;E('overlay').classList.add('show')}function next(){idx=(idx+1)%items.length;save();render()}function updateStats(){const tries=logs.length,ok=logs.filter(x=>x.ok).length;E('stats').textContent=tries?Math.round(ok/tries*100)+'%':'0%'}
</script></body></html>
