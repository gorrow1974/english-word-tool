<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word World v25-alpha 30</title>
<style>
*{box-sizing:border-box}
:root{--bg:#f6faf4;--green:#174a2b;--navy:#07345b;--orange:#fb7c13;--line:#dce7da}
body{margin:0;background:var(--bg);color:#102016;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
.app{max-width:760px;margin:auto;padding:12px 10px 104px}
.top{display:flex;justify-content:space-between;gap:10px;align-items:center}
.logo{font-size:25px;font-weight:1000;color:var(--green);line-height:1}
.logo small{display:block;font-size:12px;color:#64748b;margin-top:4px}
.pillTop{background:white;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:1000;color:#174a2b}
.hero{background:linear-gradient(135deg,#10466f,#062d50);color:white;border-radius:20px;padding:13px 15px;margin:10px 0}
.hero h1{margin:0;font-size:20px}.hero p{margin:6px 0 0;font-weight:800;font-size:13px}
.tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin:8px 0}
.tabs button{border:0;border-radius:13px;background:#e5e7eb;color:#64748b;padding:10px 4px;font-weight:1000}
.tabs button.active{background:var(--orange);color:white}
.zone{background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 10px 28px #00000010;margin:10px 0}
.zoneTitle{font-weight:1000;color:#0f3d25;font-size:13px;margin-bottom:8px}
.meta span{display:inline-block;border-radius:999px;background:#e9f7ec;color:#166534;padding:5px 9px;font-weight:1000;font-size:11px;margin:2px}
.prompt{font-size:42px;font-weight:1000;text-align:center;color:#0f3d25;margin:20px 0 14px;line-height:1.1;letter-spacing:-.035em;white-space:pre-line}
.prompt.context{font-size:21px;text-align:left;letter-spacing:0;line-height:1.45}
.timer{background:#f8fafc;border:1px solid #dbe3df;border-radius:16px;padding:9px;margin-top:8px}
.timerTop{display:flex;justify-content:space-between;align-items:center;font-weight:1000;font-size:13px}
.timerTop b{font-size:20px;color:var(--orange)}
.barOut{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:7px}
.bar{height:100%;width:100%;background:var(--orange)}
.answers{display:grid;gap:9px}
.answers.flash{grid-template-columns:1fr 1fr}
.answers.structure{grid-template-columns:1fr 1fr}
.btn{border:2px solid #d8e7f7;border-radius:18px;background:#f8fbff;padding:14px 8px;font-size:15px;font-weight:1000;text-align:center;cursor:pointer}
.known{background:#dcfce7;border-color:#22c55e;color:#166534;font-size:22px;padding:24px 8px}
.unknown{background:#fee2e2;border-color:#ef4444;color:#991b1b;font-size:22px;padding:24px 8px}
.groupBtn.correctFlash{background:#dcfce7;border-color:#22c55e;color:#166534}
.groupBtn.wrongFlash{background:#fee2e2;border-color:#ef4444;color:#991b1b}
.explain{min-height:58px;background:#fff8e7;border:2px solid #f2c878;border-radius:18px;padding:12px;font-weight:900;line-height:1.45}
.detail{display:none;margin-top:10px;border-radius:16px;border:2px solid #cfe8d2;background:#f8fff9;padding:12px}
.detail.show{display:block}
.detailTitle{font-weight:1000;color:#166534;margin-bottom:7px}
.sample{background:#fff;border-radius:12px;padding:10px;margin:8px 0;font-weight:800;line-height:1.45}
.symbol{font-size:18px;text-align:center;font-weight:1000;color:#0f3d25;margin-top:8px}
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:var(--navy);color:white;border-radius:16px;padding:10px;margin-top:10px}
.big{font-size:17px;font-weight:1000}.lbl{font-size:10px;color:#d5e9f7;font-weight:900}
.footer{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 25%);padding:26px 10px 10px}
.nav{max-width:760px;margin:auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.nav button{border:0;border-radius:18px;padding:13px 8px;font-weight:1000;font-size:14px}.secondary{background:#e5e7eb}.primary{background:var(--green);color:white}
@media(max-width:520px){.logo{font-size:22px}.hero h1{font-size:17px}.prompt{font-size:34px}.prompt.context{font-size:16px}.zone{padding:12px;border-radius:18px;margin:8px 0}.btn{font-size:13px;padding:10px 5px}.known,.unknown{font-size:18px;padding:22px 6px}.timerTop{font-size:12px}.timerTop b{font-size:16px}.big{font-size:15px}.lbl{font-size:9px}}
</style>
</head>
<body>
<div class="app">
 <div class="top"><div class="logo">🌏 Word World<small>v25-α / VS・WHY・SO 30問検証版</small></div><div class="pillTop" id="modePill">Flash</div></div>
 <section class="hero"><h1 id="heroTitle">Flash：知ってる？</h1><p id="heroText">まずはChunkを見て3秒以内に反応。</p></section>
 <div class="tabs"><button class="active" data-mode="flash">Flash</button><button data-mode="structure">Structure</button></div>
 <section class="zone"><div class="zoneTitle">問題エリア</div><div class="meta" id="meta"></div><div class="prompt" id="prompt">Loading...</div><div class="timer"><div class="timerTop"><span>認識時間</span><span><b id="remain">3.0</b> 秒</span></div><div class="barOut"><div class="bar" id="bar"></div></div></div></section>
 <section class="zone"><div class="zoneTitle">回答エリア</div><div class="answers flash" id="answers"></div></section>
 <section class="zone"><div class="zoneTitle">解説エリア</div><div class="explain" id="explain">見た瞬間に反応。</div><div class="detail" id="detail"><div class="detailTitle" id="detailTitle"></div><div class="sample" id="sample"></div><div class="symbol" id="symbol"></div></div></section>
 <div class="dash"><div><div class="big" id="modeDash">Flash</div><div class="lbl">現在</div></div><div><div class="big" id="pos">1/30</div><div class="lbl">位置</div></div><div><div class="big" id="rate">0%</div><div class="lbl">通過率</div></div><div><div class="big" id="attempts">0</div><div class="lbl">試行</div></div></div>
</div>
<div class="footer"><div class="nav"><button class="secondary" id="prev">前へ</button><button class="secondary" id="reset">リセット</button><button class="primary" id="next">次へ</button></div></div>
<script>
let DATA,items=[],groups=[],logs=[],idx=0,mode='flash',timer=null,t0=0,limit=3;
const LIMITS={flash:3,structure:15},E=x=>document.getElementById(x);
fetch('data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{DATA=d;items=d.items;groups=d.groups;logs=JSON.parse(localStorage.ww25alog||'[]');idx=+localStorage.ww25aidx||0;mode=localStorage.ww25amode||'flash';bind();render()});
function bind(){E('next').onclick=next;E('prev').onclick=prev;E('reset').onclick=()=>{localStorage.removeItem('ww25alog');localStorage.removeItem('ww25aidx');localStorage.removeItem('ww25amode');logs=[];idx=0;mode='flash';render()};document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;render()})}
function current(){return items[idx%items.length]}
function render(){let it=current();E('detail').classList.remove('show');document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));E('modePill').textContent=mode==='flash'?'Flash':'Structure';E('modeDash').textContent=mode==='flash'?'Flash':'Struct';E('pos').textContent=(idx%items.length+1)+'/'+items.length;E('meta').innerHTML='<span>'+it.id+'</span><span>'+it.theme+'</span><span>'+it.core_type+'</span>';
 if(mode==='flash'){E('heroTitle').textContent='Flash：知ってる？';E('heroText').textContent='3秒以内。Chunkを見て知ってる/知らない。';E('prompt').className='prompt';E('prompt').textContent=it.chunk;E('explain').textContent='見た瞬間に反応。';drawFlash()}
 else{E('heroTitle').textContent='Structure：どの読み方？';E('heroText').textContent='15秒以内。文を見て7分類から選ぶ。';E('prompt').className='prompt context';E('prompt').textContent=it.prompt;E('explain').textContent='文の役割を選ぶ。';drawStructure()}
 dash();start()}
function drawFlash(){E('answers').className='answers flash';E('answers').innerHTML='';[['known','知ってる'],['unknown','知らない']].forEach(x=>{let b=document.createElement('button');b.className='btn '+x[0];b.textContent=x[1];b.onclick=()=>answerFlash(x[0]);E('answers').appendChild(b)})}
function drawStructure(){E('answers').className='answers structure';E('answers').innerHTML='';groups.forEach(g=>{let b=document.createElement('button');b.className='btn groupBtn';b.innerHTML='<b>'+g.id+'</b><br><small>'+g.label+'</small>';b.onclick=()=>answerStructure(g.id,b);E('answers').appendChild(b)})}
function start(){if(timer)clearInterval(timer);limit=LIMITS[mode];E('remain').textContent=limit.toFixed(1);t0=Date.now();timer=setInterval(()=>{let s=(Date.now()-t0)/1000,r=Math.max(0,limit-s),p=Math.max(0,r/limit*100);E('remain').textContent=r.toFixed(1);E('bar').style.width=p+'%';E('bar').style.background=p>50?'#fb7c13':p>20?'#facc15':'#ef4444';if(r<=0)clearInterval(timer)},100)}
function sec(){let s=(Date.now()-t0)/1000;if(timer)clearInterval(timer);return +s.toFixed(2)}
function showDetail(ok){let it=current();E('detailTitle').textContent='正解：'+it.core_type+' / '+it.display;E('sample').textContent='例文：'+it.prompt;E('symbol').textContent=it.symbol+'　｜　'+it.note;E('detail').classList.add('show');E('explain').textContent=ok?'OK。構造が見えています。':'もう一歩。文の流れを見よう。'}
function answerFlash(resp){let it=current(),t=sec();logs.push({mode:'flash',id:it.id,chunk:it.chunk,response:resp,pass:resp==='known'&&t<=limit,time:t,ts:new Date().toISOString()});save();E('explain').textContent=resp==='known'?'記録しました。':'未学習として記録しました。';setTimeout(next,300);dash()}
function answerStructure(ans,btn){let it=current(),t=sec(),ok=ans===it.core_type&&t<=limit;[...E('answers').children].forEach(b=>b.disabled=true);btn.classList.add(ok?'correctFlash':'wrongFlash');logs.push({mode:'structure',id:it.id,answer:ans,correct:it.core_type,pass:ok,time:t,ts:new Date().toISOString()});save();showDetail(ok);dash()}
function next(){idx=(idx+1)%items.length;save();render()}function prev(){idx=(idx-1+items.length)%items.length;save();render()}function save(){localStorage.ww25alog=JSON.stringify(logs);localStorage.ww25aidx=idx;localStorage.ww25amode=mode}
function dash(){let ls=logs.filter(l=>l.mode===mode),ok=ls.filter(l=>l.pass).length;E('attempts').textContent=ls.length;E('rate').textContent=ls.length?Math.round(ok/ls.length*100)+'%':'0%'}
</script>
</body></html>
