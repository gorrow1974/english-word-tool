<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CLES v1.2.0</title><style>
*{box-sizing:border-box}:root{--bg:#f6faf5;--ink:#102016;--muted:#64748b;--green:#174a2b;--navy:#07345b;--orange:#fb7c13;--line:#dce7da;--soft:#fff8e7}body{margin:0;background:radial-gradient(circle at top,#fff 0,#f6faf5 52%,#edf7ef 100%);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink)}button{font:inherit}.app{min-height:100vh;max-width:1100px;margin:0 auto;padding:16px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.logo{font-size:25px;font-weight:1000;color:var(--green)}.logo small{display:block;color:var(--muted);font-size:11px;margin-top:5px}.chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:1000;color:var(--green)}.screen{display:none}.screen.active{display:block}.hero,.card,.questionCard{background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:0 18px 50px #0000000d}.hero{padding:28px}.hero h1{font-size:38px;line-height:1.05;color:var(--navy);margin:0 0 12px}.hero p{line-height:1.65;color:#334155;font-weight:800}.menu,.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}.menuBtn{border:0;border-radius:22px;padding:20px;background:#fff;border:1px solid var(--line);text-align:left;box-shadow:0 12px 30px #0000000b;cursor:pointer}.menuBtn b{display:block;font-size:19px;color:var(--navy);margin-bottom:5px}.menuBtn span,.small{font-size:12px;color:var(--muted);font-weight:800}.sectionTitle{display:flex;justify-content:space-between;align-items:center;margin:8px 0 14px}.sectionTitle h2{margin:0;color:var(--navy)}.card{padding:18px}.btn{border:0;border-radius:16px;padding:11px 15px;font-weight:1000;cursor:pointer}.primary{background:var(--green);color:#fff}.secondary{background:#e5e7eb;color:#334155}.outline{background:#fff;border:1px solid var(--line);color:var(--green)}.profileSelect{display:flex;gap:8px;flex-wrap:wrap}.profileSelect button.active{background:var(--green);color:#fff}.weekActions{display:flex;gap:8px;margin-top:12px}.statsGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:14px;text-align:center}.stat b{display:block;font-size:26px;color:var(--green)}.progressRows{display:grid;gap:10px;margin-top:12px}.progressRow{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:12px}.progressRowTop{display:flex;justify-content:space-between;font-size:13px;font-weight:1000}.meter{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.fill{height:100%;background:linear-gradient(90deg,var(--green),#4f9b68)}.reviewBox{background:#eff6ff;border:2px solid #bfdbfe;color:#1e3a8a;border-radius:18px;padding:16px;line-height:1.65;font-weight:900}.warnBox{background:#fff7ed;border:2px solid #fdba74;color:#9a3412;border-radius:18px;padding:16px;line-height:1.65;font-weight:900;margin-top:12px}.questionCard{padding:22px}.questionCard h2{color:var(--navy)}.sentence{background:var(--soft);border:2px solid #f2c878;border-radius:20px;padding:18px;font-size:27px;line-height:1.5;font-weight:950}.jp{margin-top:10px;border-top:1px dashed #e5c36c;padding-top:10px;color:#475569;font-size:15px}.choices{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:12px}.choice{border:2px solid #dbe3df;background:#fff;border-radius:17px;padding:13px;font-weight:1000;cursor:pointer}.choice.correct{background:#dcfce7;border-color:#22c55e;color:#166534}.choice.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b}.timer{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;margin-top:12px}.timerTop{display:flex;justify-content:space-between;font-weight:1000}.bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.barInner{height:100%;background:var(--orange);width:100%}.feedback{border-radius:20px;padding:16px;line-height:1.65;font-weight:900;margin-top:12px}.feedback.ok{background:#ecfdf5;border:2px solid #86efac;color:#065f46}.feedback.ng{background:#fff1f2;border:2px solid #fda4af;color:#9f1239}.footerNav{display:flex;justify-content:space-between;gap:8px;margin-top:14px;align-items:center}.hidden{display:none!important}
.heroBanner{position:relative;min-height:330px;border-radius:26px;overflow:hidden;background:#07345b center/cover no-repeat;box-shadow:0 18px 50px #00000020;margin-bottom:14px}.heroBanner:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(3,20,34,.78),rgba(3,20,34,.30) 58%,rgba(3,20,34,.08))}.heroOverlay{position:relative;z-index:1;min-height:330px;padding:28px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff}.heroOverlay h1{font-size:34px;line-height:1.15;margin:0 0 10px;text-shadow:0 3px 10px #000}.heroOverlay p{margin:0;font-size:17px;font-weight:1000;line-height:1.55;text-shadow:0 2px 8px #000}.todayCard{background:#fff8e7;border:2px solid #f2c878;border-radius:20px;padding:16px;margin:14px 0}.todayCard small{display:block;color:#64748b;font-weight:1000;margin-bottom:6px}.todayCard h3{margin:0 0 7px;color:#07345b;font-size:22px}.todayCard p{margin:0;line-height:1.55;font-weight:900;color:#334155}.todayCles{margin-top:8px!important;color:#174a2b!important}.weekThumb{width:100%;aspect-ratio:16/7;border-radius:16px;object-fit:cover;margin-bottom:12px;background:#e2e8f0}
@media(max-width:760px){.menu,.grid,.statsGrid{grid-template-columns:1fr}.hero h1{font-size:30px}.choices{grid-template-columns:repeat(2,1fr)}.sentence{font-size:20px}.app{padding:10px}}
</style></head><body><div class="app"><header class="topbar"><div class="logo">🌏 CLES Word World<small>v1.3.0 / Weekly Site / Updated 2026-07-17</small></div><div><span class="chip" id="activeUserChip"></span> <span class="chip" id="modeChip"></span></div></header>
<section id="homeScreen" class="screen active"><div class="hero"><h1>英語を読む。<br>自分の読み方も見る。</h1><p>毎週10問。正答率だけでなく、スピード・理解度・迷い方まで記録します。まずは一人の成功から始めます。</p>
    <div class="todayCard"><small>今日はこんな日</small><h3 id="todayTitle">読み込み中...</h3><p id="todayMessage"></p><p class="todayCles" id="todayClesMessage"></p></div><div class="profileSelect"><button class="btn outline" data-profile="learner">次男坊として使う</button><button class="btn outline" data-profile="developer">開発確認として使う</button></div><div class="menu"><button class="menuBtn" data-screen="weeklyScreen"><b>Weekly CLES</b><span>今週号・過去号から10問</span></button><button class="menuBtn" data-screen="progressScreen"><b>My Progress</b><span>理解度・正答率・速度</span></button><button class="menuBtn" data-screen="reviewScreen"><b>Review Room</b><span>先生レビュー</span></button><button class="menuBtn" data-screen="reviewQueueScreen"><b>Review Queue</b><span>苦手だけ再挑戦</span></button></div></div></section>
<section id="weeklyScreen" class="screen"><div class="sectionTitle"><h2>Weekly CLES</h2><button class="btn secondary" data-screen="homeScreen">ホーム</button></div><div id="weekGrid" class="grid"></div></section>
<section id="progressScreen" class="screen"><div class="sectionTitle"><h2>My Progress</h2><button class="btn secondary" data-screen="homeScreen">ホーム</button></div><div class="card"><div id="statsGrid" class="statsGrid"></div><div id="functionProgress" class="progressRows"></div></div></section>
<section id="reviewScreen" class="screen"><div class="sectionTitle"><h2>Review Room</h2><button class="btn secondary" data-screen="homeScreen">ホーム</button></div><div class="card"><div id="reviewText" class="reviewBox"></div><div id="reviewWarning" class="warnBox"></div></div></section>
<section id="reviewQueueScreen" class="screen"><div class="sectionTitle"><h2>Review Queue</h2><button class="btn secondary" data-screen="homeScreen">ホーム</button></div><div class="card"><p id="queueDescription"></p><button id="startReviewQueue" class="btn primary">苦手10問を開始</button></div></section>
<section id="learnScreen" class="screen"><div class="sectionTitle"><h2 id="learnTitle"></h2><button id="quitLearning" class="btn secondary">途中終了</button></div><div class="questionCard"><div class="small" id="questionMeta"></div><h2 id="questionTitle"></h2><div class="sentence" id="sentence"></div></div><div class="timer"><div class="timerTop"><span>認識時間</span><span><b id="timeText">10.0</b>秒</span></div><div class="bar"><div id="timeBar" class="barInner"></div></div></div><div id="choices" class="choices"></div><div id="feedback" class="feedback hidden"></div><div class="footerNav"><button class="btn secondary" id="previousQuestion">前へ</button><span class="chip" id="questionCounter">1/10</span><button class="btn primary" id="nextQuestion">次へ</button></div></section></div><script src="storage_manager.js"></script><script src="app.js"></script></body></html>
