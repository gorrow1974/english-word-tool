<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Word World v23 Lv01 1900</title><style>*{box-sizing:border-box}:root{--bg:#f6faf4;--green:#174a2b;--navy:#07345b;--orange:#fb7c13;--line:#dce7da}body{margin:0;background:var(--bg);color:#102016;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.app{max-width:760px;margin:auto;padding:12px 10px 112px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.logo{font-size:25px;font-weight:1000;color:var(--green);line-height:1}.logo small{display:block;font-size:12px;color:#64748b;margin-top:4px}.modePill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:1000;color:#174a2b;box-shadow:0 8px 18px #0001}.hero{background:linear-gradient(135deg,#10466f,#062d50);color:white;border-radius:20px;padding:13px 15px;margin:10px 0}.hero h1{margin:0;font-size:20px}.hero p{margin:6px 0 0;font-weight:800;font-size:13px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:8px 0}.tabs button{border:0;border-radius:13px;background:#e5e7eb;color:#64748b;padding:9px 4px;font-weight:1000}.tabs button.active{background:var(--orange);color:white}.zone{background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 10px 28px #00000010;margin:10px 0}.zoneTitle{font-weight:1000;color:#0f3d25;font-size:13px;margin-bottom:8px}.pill{display:inline-block;border-radius:999px;background:#e9f7ec;color:#166534;padding:5px 9px;font-weight:1000;font-size:11px;margin:2px}.prompt{font-size:42px;font-weight:1000;text-align:center;color:#0f3d25;margin:20px 0 14px;line-height:1.08;letter-spacing:-.035em;white-space:pre-line}.prompt.context{font-size:20px;text-align:left;letter-spacing:0;line-height:1.45;margin:16px 0}.faint{opacity:.28}.timer{background:#f8fafc;border:1px solid #dbe3df;border-radius:16px;padding:9px;margin-top:8px}.timerTop{display:flex;justify-content:space-between;align-items:center;font-weight:1000;font-size:13px}.timerTop b{font-size:20px;color:var(--orange)}.barOut{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:7px}.bar{height:100%;width:100%;background:var(--orange)}.answers{display:grid;gap:9px}.answers.lv01{grid-template-columns:1fr 1fr}.answers.groups{grid-template-columns:1fr 1fr}.btn{border:2px solid #d8e7f7;border-radius:18px;background:#f8fbff;padding:14px 8px;font-size:16px;font-weight:1000;text-align:center;cursor:pointer}.known{background:#dcfce7;border-color:#22c55e;color:#166534;font-size:22px;padding:24px 8px}.unknown{background:#fee2e2;border-color:#ef4444;color:#991b1b;font-size:22px;padding:24px 8px}.groupBtn.sel{background:#dbeafe;border-color:#3b82f6;color:#1d4ed8}.check{grid-column:1/-1;background:var(--green);color:white}.explain{min-height:58px;background:#fff8e7;border:2px solid #f2c878;border-radius:18px;padding:12px;font-weight:900;line-height:1.45}.detail{display:none;margin-top:10px;border-radius:16px;border:2px solid #cfe8d2;background:#f8fff9;padding:12px}.detail.show{display:block}.detailTitle{font-weight:1000;color:#166534;margin-bottom:7px}.sample{background:#fff;border-radius:12px;padding:10px;margin:8px 0;font-weight:800;line-height:1.45}.arrow{white-space:pre-line;text-align:center;font-weight:1000;font-size:18px;line-height:1.35;color:#0f3d25}.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:var(--navy);color:white;border-radius:16px;padding:10px;margin-top:10px}.big{font-size:18px;font-weight:1000}.lbl{font-size:10px;color:#d5e9f7;font-weight:900}.footer{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 25%);padding:26px 10px 10px}.nav{max-width:760px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.nav button{border:0;border-radius:18px;padding:12px 6px;font-weight:1000;font-size:13px}.secondary{background:#e5e7eb}.primary{background:var(--green);color:white}.file{display:none}@media(max-width:520px){.logo{font-size:22px}.prompt{font-size:36px}.prompt.context{font-size:16px}.zone{padding:12px;border-radius:18px;margin:8px 0}.btn{font-size:13px;padding:10px 5px}.known,.unknown{font-size:18px;padding:22px 6px}.timerTop{font-size:12px}.timerTop b{font-size:16px}.dash{gap:5px;padding:9px}.big{font-size:15px}.lbl{font-size:9px}.arrow{font-size:15px}.sample{font-size:13px}.nav{grid-template-columns:repeat(4,1fr)}}</style></head><body><div class="app"><div class="top"><div class="logo">🌏 Word World<small>v23 / Lv01 1900 Ready</small></div><div class="modePill" id="modePill">Lv01</div></div><section class="hero"><h1 id="heroTitle">Lv01：語彙認識</h1><p id="heroText">1900語・phrase対応。上段＝問題、中段＝回答、下段＝解説。</p></section><div class="tabs"><button class="active" data-mode="1">Lv01</button><button data-mode="2">Lv02</button><button data-mode="25">Lv02.5</button></div><section class="zone"><div class="zoneTitle">問題エリア</div><div id="meta"></div><div class="prompt" id="prompt">Loading...</div><div class="timer"><div class="timerTop"><span>認識時間</span><span><b id="remain">3.0</b> 秒</span></div><div class="barOut"><div class="bar" id="bar"></div></div></div></section><section class="zone"><div class="zoneTitle">回答エリア</div><div class="answers lv01" id="answers"></div></section><section class="zone"><div class="zoneTitle">解説エリア</div><div class="explain" id="explain">見た瞬間に反応。</div><div class="detail" id="detail"><div class="detailTitle" id="detailTitle"></div><div class="sample" id="sample"></div><div class="arrow" id="arrow"></div></div></section><div class="dash"><div><div class="big" id="modeDash">Lv01</div><div class="lbl">現在</div></div><div><div class="big" id="pos">1/1900</div><div class="lbl">位置</div></div><div><div class="big" id="rate">0%</div><div class="lbl">通過率</div></div><div><div class="big" id="attempts">0</div><div class="lbl">試行</div></div></div></div><div class="footer"><div class="nav"><button class="secondary" id="prev">前へ</button><button class="secondary" id="shuffle">ランダム</button><button class="secondary" id="export">CSV</button><button class="primary" id="next">次へ</button></div></div><input class="file" type="file" id="importFile" accept=".json"><script>let DATA,items=[],groups=[],logs=[],idx=0,mode=1,timer=null,t0=0,limit=3,selected=new Set(),fadeStage=0;const MODE_LIMITS={1:3,2:15,25:15},E=x=>document.getElementById(x);fetch('data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{DATA=d;items=d.items;groups=d.uiGroups;logs=JSON.parse(localStorage.ww23logs||'[]');idx=+localStorage.ww23idx||0;mode=+localStorage.ww23mode||1;bind();render()});function current(){return items[idx%items.length]}function bind(){E('next').onclick=next;E('prev').onclick=prev;E('shuffle').onclick=()=>{idx=Math.floor(Math.random()*items.length);save();render()};E('export').onclick=exportCsv;document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{mode=+b.dataset.mode;render()})}function render(){let it=current();selected=new Set();E('detail').classList.remove('show');document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',+b.dataset.mode===mode));let label=mode===25?'Lv02.5':'Lv0'+mode;E('modePill').textContent=label;E('modeDash').textContent=label;E('pos').textContent=(idx%items.length+1)+'/'+items.length;E('meta').innerHTML='<span class="pill">'+it.id+'</span><span class="pill">'+label+'</span>';if(mode===1){E('heroTitle').textContent='Lv01：語彙認識';E('heroText').textContent='3秒以内。1900語・phraseを高速判定。';E('prompt').className='prompt';E('prompt').textContent=it.surface;E('explain').textContent='3秒以内。見た瞬間に反応。';drawLv1()}if(mode===2){E('heroTitle').textContent='Lv02：論理トリガー即時検知';E('heroText').textContent='15秒以内。この語が呼び出す構造を7分類から選ぶ。';E('prompt').className='prompt';E('prompt').textContent=it.surface;E('explain').textContent='正解カテゴリを選ぶ。';drawGroups(answerLv2)}if(mode===25){E('heroTitle').textContent='Lv02.5：フェーディング訓練';E('heroText').textContent='15秒以内。文脈で読む。';E('prompt').className='prompt context';E('prompt').innerHTML=getFadingText(it);E('explain').textContent='単語ではなく文脈から選ぶ。';drawGroups(answerLv25)}dash();start()}function getFadingText(it){let arr=[it.fadingVisible,it.fadingFaint,it.fadingHidden],txt=arr[fadeStage%3]||it.example;if(fadeStage%3===1){let m=txt.match(/\((.*?)\)/);if(m)return txt.replace('('+m[1]+')','<span class="faint">'+m[1]+'</span>')}return txt}function drawLv1(){E('answers').className='answers lv01';E('answers').innerHTML='';[['known','知ってる'],['unknown','知らない']].forEach(x=>{let b=document.createElement('button');b.className='btn '+x[0];b.textContent=x[1];b.onclick=()=>answerLv1(x[0]);E('answers').appendChild(b)})}function drawGroups(handler){E('answers').className='answers groups';E('answers').innerHTML='';groups.forEach(g=>{let b=document.createElement('button');b.className='btn groupBtn';b.innerHTML='<b>'+g.label+'</b><br><small>'+g.jp+'</small>';b.onclick=()=>{selected.has(g.id)?(selected.delete(g.id),b.classList.remove('sel')):(selected.add(g.id),b.classList.add('sel'))};E('answers').appendChild(b)});let ok=document.createElement('button');ok.className='btn check';ok.textContent='OK';ok.onclick=handler;E('answers').appendChild(ok)}function start(){if(timer)clearInterval(timer);limit=MODE_LIMITS[mode]||15;E('remain').textContent=limit.toFixed(1);t0=Date.now();timer=setInterval(()=>{let s=(Date.now()-t0)/1000,r=Math.max(0,limit-s),p=Math.max(0,r/limit*100);E('remain').textContent=r.toFixed(1);E('bar').style.width=p+'%';E('bar').style.background=p>50?'#fb7c13':p>20?'#facc15':'#ef4444';if(r<=0)clearInterval(timer)},100)}function sec(){let s=(Date.now()-t0)/1000;if(timer)clearInterval(timer);return +s.toFixed(2)}function setEq(a,b){return a.length===b.length&&a.every(x=>b.includes(x))}function answerLv1(resp){let it=current(),t=sec();logs.push({mode:'Lv01',itemId:it.id,surface:it.surface,response:resp,pass:resp==='known'&&t<=limit,responseTimeSec:t,timestamp:new Date().toISOString()});save();E('explain').textContent=resp==='known'?'記録しました。':'未学習として記録しました。';setTimeout(next,320);dash()}function showAnswer(ok){let it=current();E('detailTitle').textContent='正解：'+it.group.join(' / ')+'　詳細：'+it.tags.join('・');E('sample').textContent='例文：'+it.example;E('arrow').textContent=it.arrow;E('detail').classList.add('show');E('explain').textContent=ok?'OK。単語→構造→文脈がつながっています。':'もう一歩。文脈を確認しよう。'}function answerLv2(){let it=current(),t=sec(),sel=[...selected],ok=setEq(sel.sort(),[...it.group].sort())&&t<=limit;logs.push({mode:'Lv02',itemId:it.id,surface:it.surface,response:sel,correct:it.group,pass:ok,responseTimeSec:t,timestamp:new Date().toISOString()});save();showAnswer(ok);dash()}function answerLv25(){let it=current(),t=sec(),sel=[...selected],ok=setEq(sel.sort(),[...it.group].sort())&&t<=limit;logs.push({mode:'Lv02.5',stage:fadeStage%3,itemId:it.id,surface:it.surface,response:sel,correct:it.group,pass:ok,responseTimeSec:t,timestamp:new Date().toISOString()});save();showAnswer(ok);dash()}function next(){if(mode===25){fadeStage++;if(fadeStage%3!==0){render();return}}idx=(idx+1)%items.length;save();render()}function prev(){idx=(idx-1+items.length)%items.length;save();render()}function save(){localStorage.ww23logs=JSON.stringify(logs);localStorage.ww23idx=idx;localStorage.ww23mode=mode}function dash(){let label=mode===25?'Lv02.5':'Lv0'+mode,ls=logs.filter(l=>l.mode===label),ok=ls.filter(l=>l.pass).length;E('attempts').textContent=ls.length;E('rate').textContent=ls.length?Math.round(ok/ls.length*100)+'%':'0%'}function exportCsv(){let rows=[['mode','itemId','surface','response','correct','pass','responseTimeSec','timestamp']].concat(logs.map(l=>[l.mode,l.itemId,l.surface,Array.isArray(l.response)?l.response.join('|'):l.response,Array.isArray(l.correct)?l.correct.join('|'):'',l.pass,l.responseTimeSec,l.timestamp]));let csv=rows.map(r=>r.map(x=>'"'+String(x??'').replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='wordworld_logs.csv';a.click()}</script></body></html>
