<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CLES Logic Layer 0.1</title>
  <style>
    :root{
      --bg:#0b1020;--panel:#121a2e;--panel2:#18223a;--text:#f8fafc;--muted:#94a3b8;--line:#2d3a57;--ok:#22c55e;--ng:#ef4444;--accent:#38bdf8;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:manipulation;}
    .app{max-width:720px;margin:0 auto;padding:14px;min-height:100vh;display:flex;flex-direction:column;gap:12px}
    .top{display:flex;gap:8px;align-items:center;justify-content:space-between}
    .title{font-size:14px;color:var(--muted);font-weight:700;letter-spacing:.02em}
    .modebar{display:flex;gap:6px}
    .pill{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:999px;padding:8px 10px;font-size:12px;font-weight:700}
    .pill.active{border-color:var(--accent);color:var(--accent)}
    .card{background:linear-gradient(180deg,var(--panel),#0f172a);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .progress{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-bottom:16px}
    .word{font-size:44px;font-weight:900;text-align:center;line-height:1.1;margin:28px 0 8px;color:#fff;word-break:break-word}
    .hint{min-height:24px;text-align:center;font-size:13px;color:var(--muted);margin-bottom:10px}
    .buttons{display:grid;grid-template-columns:1fr;gap:9px}
    button{font:inherit;color:inherit}
    .choice{width:100%;border:1px solid var(--line);background:var(--panel2);border-radius:14px;padding:14px 14px;text-align:left;min-height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .choice:active{transform:scale(.99);background:#22304d}
    .tag{font-size:22px;font-weight:900;color:#e2e8f0;min-width:62px}
    .sub{flex:1;color:var(--muted);font-size:13px;line-height:1.25}
    .jp{color:#cbd5e1;font-size:12px;margin-top:3px}
    .result{min-height:44px;text-align:center;font-weight:800;font-size:15px;padding:10px;border-radius:12px;border:1px solid transparent}
    .result.ok{color:var(--ok);border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.08)}
    .result.ng{color:var(--ng);border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08)}
    .ops{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .op{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:12px 8px;font-size:13px;font-weight:800;color:#cbd5e1}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 4px;text-align:center}
    .stat b{display:block;font-size:13px;color:var(--accent)}
    .stat span{font-size:11px;color:var(--muted)}
    dialog{border:none;border-radius:18px;background:var(--panel);color:var(--text);max-width:680px;width:92%;padding:0}
    .modal{padding:18px}.modal h2{margin:0 0 10px;font-size:20px}.legend{display:grid;gap:8px}.legend-row{border:1px solid var(--line);border-radius:12px;padding:10px;background:#0f172a}.legend-row b{color:var(--accent)}
    .small{color:var(--muted);font-size:12px;line-height:1.5}
    @media (min-width:560px){.buttons{grid-template-columns:1fr 1fr}.choice:nth-child(5){grid-column:1/3}.word{font-size:56px}}
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="title">CLES Logic Layer 0.1 / 50 words PoC</div>
    <div class="modebar">
      <button class="pill active" data-mode="learn">Learn</button>
      <button class="pill" data-mode="drill">Drill</button>
      <button class="pill" data-mode="test">Test</button>
    </div>
  </div>

  <section class="card">
    <div class="progress"><span id="count">1 / 50</span><span id="score">Correct 0 / 0</span></div>
    <div class="word" id="word">however</div>
    <div class="hint" id="hint">前後の内容が逆方向へ転換する</div>
    <div class="buttons" id="choices"></div>
  </section>

  <div class="result" id="result">選択すると、正誤・反応時間・誤答傾向を記録します。</div>

  <section class="stats" id="stats"></section>

  <div class="ops">
    <button class="op" id="nextBtn">次へ</button>
    <button class="op" id="legendBtn">凡例</button>
    <button class="op" id="csvBtn">CSV</button>
  </div>
  <button class="op" id="resetBtn">ログをリセット</button>

  <p class="small">目的：満点ではなく、正答率・反応速度・誤答パターンを測る。第一世代はアジャストメント能力そのものではなく、その手前のセンサー作り。</p>
</div>

<dialog id="legendDialog">
  <div class="modal">
    <h2>凡例</h2>
    <div class="legend" id="legend"></div>
    <p class="small">Learn：日本語まで表示 / Drill：英語補足まで表示 / Test：タグのみ表示</p>
    <button class="op" onclick="legendDialog.close()">閉じる</button>
  </div>
</dialog>

<script>
const TAGS = {
  VS:{en:'comparison / contrast', jp:'対比・比較', desc:'前後の内容が逆方向・対立・比較になる'},
  SO:{en:'conclusion / result', jp:'結論・帰結', desc:'前の内容から結果・結論へ進む'},
  DATA:{en:'evidence / grounds', jp:'根拠・データ', desc:'主張を支える根拠・調査・事実'},
  EX:{en:'example / illustration', jp:'具体例・例示', desc:'抽象的な説明を具体例で補う'},
  DEC:{en:'judgment / decision', jp:'判断・提言', desc:'すべきこと・判断・提案・結論づけ'}
};
const ITEMS = [
  ['however','VS','前後の文を逆方向へ転換する'],['while','VS','同時に対比を作ることが多い'],['whereas','VS','二つの事柄を対比する'],['instead','VS','別案・置き換えを示す'],['unlike','VS','違いを示す'],['on the other hand','VS','別の側面・反対側を出す'],['rather than','VS','AではなくBを選ぶ'],['in contrast','VS','明示的な対比'],['conversely','VS','逆方向の見方'],['but','VS','基本的な逆接'],
  ['therefore','SO','前の根拠から結論へ進む'],['thus','SO','結果・結論を示す'],['hence','SO','そこから導かれる結論'],['so','SO','だから・その結果'],['consequently','SO','結果として'],['as a result','SO','結果として'],['accordingly','SO','それに応じて'],['for this reason','SO','この理由により'],['thereby','SO','それによって'],['result in','SO','結果として生じる'],
  ['according to','DATA','出典・根拠を示す'],['evidence','DATA','証拠'],['data','DATA','データ'],['statistics','DATA','統計'],['research','DATA','研究'],['survey','DATA','調査'],['study','DATA','研究・調査'],['findings','DATA','調査結果'],['report','DATA','報告・資料'],['analysis','DATA','分析'],
  ['for example','EX','具体例を出す'],['for instance','EX','具体例を出す'],['such as','EX','例を列挙する'],['including','EX','含まれる例を示す'],['like','EX','例示として使う'],['namely','EX','具体的に言い換える'],['specifically','EX','具体化する'],['to illustrate','EX','説明のために例を出す'],['one example','EX','ひとつの例'],['e.g.','EX','例示'],
  ['should','DEC','すべきという判断'],['must','DEC','強い必要・義務'],['need to','DEC','必要性の判断'],['ought to','DEC','すべきという提言'],['recommend','DEC','推奨する'],['suggest','DEC','提案する'],['propose','DEC','提案する'],['decide','DEC','決定する'],['determine','DEC','判断・決定する'],['conclude','DEC','結論づける']
].map(([word,tag,why])=>({word,tag,why}));
let mode='learn', index=0, answered=false, start=Date.now();
let logs = JSON.parse(localStorage.getItem('cles_logic_logs') || '[]');
const wordEl=document.getElementById('word'), hintEl=document.getElementById('hint'), choicesEl=document.getElementById('choices'), resultEl=document.getElementById('result');
function save(){localStorage.setItem('cles_logic_logs',JSON.stringify(logs));}
function renderChoices(){choicesEl.innerHTML='';Object.keys(TAGS).forEach(tag=>{const t=TAGS[tag];const b=document.createElement('button');b.className='choice';b.onclick=()=>answer(tag);let sub=''; if(mode==='learn') sub=`<div class="sub">${t.en}<div class="jp">${t.jp}</div></div>`; if(mode==='drill') sub=`<div class="sub">${t.en}</div>`; if(mode==='test') sub='<div class="sub"></div>'; b.innerHTML=`<div class="tag">${tag}</div>${sub}`;choicesEl.appendChild(b);});}
function render(){const item=ITEMS[index];wordEl.textContent=item.word;hintEl.textContent=(mode==='learn')?item.why:'';document.getElementById('count').textContent=`${index+1} / ${ITEMS.length}`;answered=false;start=Date.now();renderChoices();renderStats();}
function answer(selected){if(answered)return;answered=true;const item=ITEMS[index];const ms=Date.now()-start;const ok=selected===item.tag;logs.push({word:item.word,selected,correct:item.tag,result:ok?'OK':'NG',response_ms:ms,mode,timestamp:new Date().toISOString()});save();resultEl.className='result '+(ok?'ok':'ng');resultEl.textContent= ok ? `OK ${item.tag} / ${ms}ms` : `NG selected ${selected} → correct ${item.tag} / ${ms}ms`;renderStats();}
function next(){index=(index+1)%ITEMS.length;resultEl.className='result';resultEl.textContent='';render();}
function renderStats(){const total=logs.length, ok=logs.filter(l=>l.result==='OK').length;document.getElementById('score').textContent=`Correct ${ok} / ${total}`;const s=document.getElementById('stats');s.innerHTML='';Object.keys(TAGS).forEach(tag=>{const arr=logs.filter(l=>l.correct===tag);const rate=arr.length?Math.round(arr.filter(l=>l.result==='OK').length/arr.length*100):0;const avg=arr.length?Math.round(arr.reduce((a,l)=>a+l.response_ms,0)/arr.length):0;const d=document.createElement('div');d.className='stat';d.innerHTML=`<b>${tag}</b><span>${rate}%</span><br><span>${avg||'-'}ms</span>`;s.appendChild(d);});}
function csv(){const header='word,selected,correct,result,response_ms,mode,timestamp\n';const rows=logs.map(l=>[l.word,l.selected,l.correct,l.result,l.response_ms,l.mode,l.timestamp].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');const blob=new Blob([header+rows],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cles_logic_logs.csv';a.click();URL.revokeObjectURL(a.href);}
function reset(){if(confirm('ログをリセットしますか？')){logs=[];save();renderStats();resultEl.className='result';resultEl.textContent='ログをリセットしました。';}}
document.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{mode=p.dataset.mode;document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');renderChoices();hintEl.textContent=(mode==='learn')?ITEMS[index].why:'';});
document.getElementById('nextBtn').onclick=next;document.getElementById('csvBtn').onclick=csv;document.getElementById('resetBtn').onclick=reset;document.getElementById('legendBtn').onclick=()=>legendDialog.showModal();
const legend=document.getElementById('legend');Object.keys(TAGS).forEach(tag=>{const t=TAGS[tag];const r=document.createElement('div');r.className='legend-row';r.innerHTML=`<b>${tag}</b><br>${t.en}<br>${t.jp}<br><span class="small">${t.desc}</span>`;legend.appendChild(r);});
render();
</script>
</body>
</html>
